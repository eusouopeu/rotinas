<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Rotinas</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1C1B1A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1C1B1A;
    --surface: #262422;
    --surface-2: #2F2C29;
    --line: #3A3632;
    --text: #EDE7DD;
    --muted: #8A8478;
    --accent: #E0619E;
    --accent-2: #5B8DEF;
    --accent-dim: #8F4066;
    --grad: linear-gradient(135deg, #EC6AA8, #5B8DEF);
    --on-accent: #FFFFFF;
    --good: #6B8F71;
    --danger: #B25B4C;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --tabbar-h: 58px;
  }
  body.light{
    --bg: #F6F2EC;
    --surface: #FFFFFF;
    --surface-2: #EFE9E0;
    --line: #DDD5C9;
    --text: #2A2622;
    --muted: #8B8378;
    --accent: #D34E8F;
    --accent-2: #3E6FD6;
    --accent-dim: #E4A9C8;
    --grad: linear-gradient(135deg, #E45A9C, #4A7BE0);
    --on-accent: #FFFFFF;
    --good: #4F7A57;
    --danger: #B0503F;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    overscroll-behavior: none;
    user-select: none;
  }
  #app{
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    padding-top: calc(var(--safe-top) + 18px);
  }
  .screen{ flex:1; display:flex; flex-direction:column; padding:0 20px; animation: fade .25s ease; }
  .screen.with-tabbar{ padding-bottom: calc(var(--tabbar-h) + var(--safe-bottom) + 10px); }
  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  h1,h2,h3{ font-family:'Fraunces', serif; font-weight:600; margin:0; letter-spacing:-0.01em; }

  /* ---------- TABBAR ---------- */
  .tabbar{
    position:fixed; left:0; right:0; bottom:0; height:calc(var(--tabbar-h) + var(--safe-bottom));
    background:var(--surface); border-top:1px solid var(--line);
    display:flex; padding-bottom:var(--safe-bottom); z-index:30;
  }
  .tabbar button{
    flex:1; background:none; border:none; color:var(--muted);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    font-family:'Inter'; font-size:11.5px;
  }
  .tabbar button .ic{ font-size:19px; }
  .tabbar button.active{ color:var(--accent); }

  /* ---------- HOME / HEADER ---------- */
  .home-header{ display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:22px; gap:10px; }
  .home-header h1{ font-size:32px; }
  .header-right{ display:flex; align-items:center; gap:10px; }
  .streak{ font-family:'IBM Plex Mono', monospace; font-size:13px; color: var(--accent); display:flex; align-items:center; gap:6px; }
  .streak .dot{ width:6px; height:6px; border-radius:50%; background:var(--accent); }
  .bell-btn{ width:34px; height:34px; border-radius:10px; background:var(--surface); border:1px solid var(--line); color:var(--muted); font-size:15px; }

  .routine-list, .notes-list{ display:flex; flex-direction:column; gap:12px; flex:1; overflow-y:auto; }
  .routine-card, .note-card{
    background: var(--surface); border:1px solid var(--line); border-radius:16px; padding:18px;
    display:flex; justify-content:space-between; align-items:center; gap:12px;
  }
  .routine-card:active, .note-card:active{ background: var(--surface-2); }
  .routine-info, .note-info{ min-width:0; flex:1; }
  .routine-info h3, .note-info h3{ font-size:19px; margin-bottom:6px; }
  .routine-meta{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--muted); }
  .note-snippet{ font-size:13px; color:var(--muted); line-height:1.4; margin-top:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .routine-actions{ display:flex; gap:8px; align-items:center; flex-shrink:0; }
  .icon-btn{
    width:38px; height:38px; border-radius:10px; background:transparent; border:1px solid var(--line);
    color:var(--muted); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;
  }
  .play-btn{
    width:44px; height:44px; border-radius:50%; background: var(--grad); color:var(--on-accent);
    display:flex; align-items:center; justify-content:center; font-size:16px; border:none;
    box-shadow: 0 4px 14px rgba(200,100,180,.35); flex-shrink:0;
  }
  .sched-chip{
    display:inline-flex; align-items:center; gap:4px; font-family:'IBM Plex Mono', monospace;
    font-size:11px; color:var(--accent); margin-top:6px;
  }
  .empty-state{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; color:var(--muted); gap:10px;
  }
  .empty-state h2{ color:var(--text); font-size:22px; }
  .empty-state p{ font-size:14px; max-width:260px; line-height:1.5; }

  .fab{
    position:fixed; right:24px; bottom:calc(var(--tabbar-h) + var(--safe-bottom) + 20px);
    width:58px; height:58px; border-radius:50%; background: var(--grad); color:var(--on-accent); border:none;
    font-size:28px; font-weight:400; display:flex; align-items:center; justify-content:center;
    box-shadow: 0 8px 24px rgba(200,100,180,.4); z-index:20;
  }

  /* ---------- ALERT BANNER ---------- */
  .alert-banner{
    position:fixed; top:calc(var(--safe-top) + 10px); left:16px; right:16px;
    background:var(--grad); color:var(--on-accent); padding:14px 16px; border-radius:14px;
    font-family:'Inter'; font-weight:600; font-size:14px; z-index:999;
    box-shadow:0 8px 24px rgba(0,0,0,.4); animation: slideIn .3s ease;
  }
  .alert-banner.hide{ opacity:0; transform:translateY(-10px); transition:.4s; }
  @keyframes slideIn{ from{opacity:0; transform:translateY(-12px);} to{opacity:1; transform:translateY(0);} }

  /* ---------- EDITOR (shared) ---------- */
  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; gap:12px; }
  .topbar .link-btn{ color:var(--accent); font-size:15px; background:none; border:none; padding:8px 0; }
  .topbar .link-btn.muted{ color:var(--muted); }

  input.name-input{
    background:none; border:none; border-bottom:2px solid var(--line);
    font-family:'Fraunces', serif; font-size:26px; color:var(--text);
    padding:8px 0; margin-bottom:18px; width:100%;
  }
  input.name-input:focus{ outline:none; border-color:var(--accent); }

  .section-label{ font-family:'IBM Plex Mono', monospace; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:18px 0 10px; }

  .steps-list{ display:flex; flex-direction:column; gap:10px; overflow-y:auto; flex:1; }
  .step-row{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:14px; display:flex; align-items:flex-start; gap:12px; }
  .step-num{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--muted); width:22px; flex-shrink:0; padding-top:2px; }
  .step-fields{ flex:1; display:flex; flex-direction:column; gap:8px; min-width:0; }
  .step-fields input[type=text]{ background:none; border:none; color:var(--text); font-size:16px; font-family:'Inter'; padding:0; width:100%; }
  .step-fields input[type=text]:focus{ outline:none; }
  .step-sub{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .type-toggle{ display:flex; background:var(--surface-2); border-radius:8px; padding:2px; font-size:11px; font-family:'IBM Plex Mono', monospace; }
  .type-toggle span{ padding:4px 8px; border-radius:6px; color:var(--muted); }
  .type-toggle span.active{ background:var(--grad); color:var(--on-accent); }
  .dur-input{ background:none; border:none; color:var(--muted); font-family:'IBM Plex Mono', monospace; font-size:13px; width:52px; }
  .dur-input:focus{ outline:none; color:var(--accent); }
  .remove-step{ color:var(--danger); background:none; border:none; font-size:18px; padding:4px 6px; flex-shrink:0; }
  .step-side{ display:flex; flex-direction:column; align-items:center; gap:2px; flex-shrink:0; }
  .order-btn{ background:none; border:none; color:var(--muted); font-size:13px; padding:4px 8px; }
  .order-btn:disabled{ opacity:.25; }

  .add-step-btn{ border:1px dashed var(--line); border-radius:14px; padding:16px; color:var(--muted); background:none; font-size:14px; text-align:center; margin-top:4px; }

  .schedule-box{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px; }
  .switch-row{ display:flex; align-items:center; justify-content:space-between; font-size:15px; }
  .switch-row input[type=checkbox]{ width:44px; height:26px; accent-color: var(--accent); }
  .sched-time-row{ margin-top:14px; display:flex; align-items:center; gap:12px; }
  .sched-time-row input[type=time]{
    background:var(--surface-2); border:1px solid var(--line); border-radius:10px; color:var(--text);
    font-family:'IBM Plex Mono', monospace; font-size:16px; padding:8px 10px;
  }
  .sched-computed{ margin-top:12px; font-size:13px; color:var(--muted); font-family:'IBM Plex Mono', monospace; }
  .sched-computed b{ color:var(--accent); font-weight:600; }

  .bottom-actions{
    position:fixed; left:0; right:0; bottom:0; padding:16px 20px calc(16px + var(--safe-bottom));
    background: linear-gradient(to top, var(--bg) 65%, transparent); display:flex; gap:10px; z-index:15;
  }
  .btn-primary{ flex:1; background:var(--grad); color:var(--on-accent); border:none; border-radius:14px; padding:16px; font-size:16px; font-weight:600; font-family:'Inter'; }
  .btn-danger-outline{ background:none; border:1px solid var(--danger); color:var(--danger); border-radius:14px; padding:16px 18px; font-size:15px; }

  /* ---------- NOTES ---------- */
  .note-topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:10px; }
  input.note-title-input{
    background:none; border:none; font-family:'Fraunces', serif; font-size:22px; color:var(--text);
    padding:6px 0; width:100%; margin-bottom:10px; border-bottom:2px solid var(--line);
  }
  input.note-title-input:focus{ outline:none; border-color:var(--accent); }
  .mode-toggle{ display:flex; background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:3px; }
  .mode-toggle span{ padding:6px 12px; border-radius:8px; font-size:13px; color:var(--muted); font-family:'IBM Plex Mono', monospace; }
  .mode-toggle span.active{ background:var(--grad); color:var(--on-accent); }
  textarea.note-content{
    flex:1; background:var(--surface); border:1px solid var(--line); border-radius:14px;
    color:var(--text); font-family:'IBM Plex Mono', monospace; font-size:15px; line-height:1.6;
    padding:14px; resize:none; width:100%;
  }
  textarea.note-content:focus{ outline:none; border-color:var(--accent); }
  .note-preview{ flex:1; overflow-y:auto; padding-bottom:20px; }
  .note-preview h1{ font-size:24px; margin:16px 0 8px; }
  .note-preview h2{ font-size:20px; margin:14px 0 6px; }
  .note-preview h3{ font-size:17px; margin:12px 0 6px; }
  .note-preview p{ margin:6px 0; font-size:15px; line-height:1.55; color:var(--text); }
  .note-preview ul, .note-preview ol{ margin:6px 0; padding-left:22px; }
  .note-preview li{ margin:3px 0; font-size:15px; line-height:1.5; }
  .note-preview code{ background:var(--surface-2); padding:1px 6px; border-radius:5px; font-family:'IBM Plex Mono', monospace; font-size:13.5px; }
  .checklist-item{ display:flex; align-items:flex-start; gap:10px; margin:6px 0; font-size:15px; line-height:1.4; }
  .checklist-box{ width:19px; height:19px; border-radius:5px; border:2px solid var(--accent); flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--accent); }
  .checklist-item.checked .checklist-box{ background:var(--grad); color:var(--on-accent); border-color:transparent; }
  .checklist-item.checked span.txt{ color:var(--muted); text-decoration:line-through; }

  /* ---------- LIVE EDITOR (Obsidian-style) ---------- */
  .live-editor{ flex:1; overflow-y:auto; padding-bottom:10px; user-select:text; }
  .live-line{ padding:4px 2px; font-size:15px; line-height:1.5; border-radius:6px; min-height:24px; }
  .live-line:active{ background:var(--surface); }
  .live-line.empty{ min-height:20px; }
  .live-line .inline-h{ margin:6px 0 2px; }
  .live-line h1.inline-h{ font-size:24px; }
  .live-line h2.inline-h{ font-size:20px; }
  .live-line h3.inline-h{ font-size:17px; }
  .li-line{ padding-left:8px; }
  .li-marker{ color:var(--accent); margin-right:6px; }
  .live-line code{ background:var(--surface-2); padding:1px 6px; border-radius:5px; font-family:'IBM Plex Mono', monospace; font-size:13.5px; }
  .live-line-input{
    width:100%; background:var(--surface); border:1px solid var(--accent-dim); border-radius:6px;
    color:var(--text); font-family:'IBM Plex Mono', monospace; font-size:14.5px; padding:6px 8px; margin:2px 0;
  }
  .live-line-input:focus{ outline:none; border-color:var(--accent); }
  .live-tail{ min-height:120px; }

  /* ---------- PLAYER ---------- */
  .player{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding: 6px 0 20px; width:100%; }
  .player-top{ width:100%; display:flex; justify-content:space-between; align-items:center; padding:0 4px; }
  .player-close{ color:var(--muted); background:none; border:none; font-size:15px; }
  .player-progress-label{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--muted); }

  .estimate-row{
    width:100%; display:flex; justify-content:center; align-items:center; gap:8px;
    font-family:'IBM Plex Mono', monospace; font-size:12.5px; color:var(--muted); margin:6px 0 2px;
  }
  .estimate-row b{ color:var(--accent); font-size:14px; }

  .dial-wrap{ position:relative; width:min(72vw, 280px); height:min(72vw, 280px); display:flex; align-items:center; justify-content:center; margin:8px 0; }
  .dial-wrap svg{ width:100%; height:100%; transform:rotate(-90deg); transition: filter .3s; }
  .dial-track{ stroke: var(--line); }
  .dial-wrap.overtime svg circle#dialArc{ stroke: var(--danger) !important; }
  .dial-time{ position:absolute; font-family:'IBM Plex Mono', monospace; font-size:15px; font-weight:500; display:flex; flex-direction:column; align-items:center; gap:6px; }
  .dial-time .t{ font-size:50px; letter-spacing:-1px; }
  .dial-time .t.overtime{ color: var(--danger); }
  .dial-time .label{ font-family:'Fraunces', serif; font-size:16px; color:var(--muted); font-weight:500; max-width:200px; text-align:center; }

  .checklist-body{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; flex:1; padding: 24px 20px; }
  .checklist-body h2{ font-size:26px; text-align:center; }
  .check-circle{ width:110px; height:110px; border-radius:50%; border:3px solid var(--accent); display:flex; align-items:center; justify-content:center; color:var(--accent); font-size:44px; }

  .step-title{ font-size:15px; color:var(--muted); font-family:'IBM Plex Mono', monospace; letter-spacing:.04em; text-transform:uppercase; }

  .player-controls{ display:flex; align-items:center; justify-content:center; gap:22px; width:100%; }
  .ctrl-btn{ width:56px; height:56px; border-radius:50%; background:var(--surface); border:1px solid var(--line); color:var(--text); font-size:18px; display:flex; align-items:center; justify-content:center; }
  .ctrl-btn.big{ width:76px; height:76px; background:var(--grad); color:var(--on-accent); border:none; font-size:24px; box-shadow: 0 6px 20px rgba(200,100,180,.4); }
  .ctrl-btn.pulse{ animation: pulseGlow 1.1s infinite; }
  @keyframes pulseGlow{ 0%,100%{ box-shadow:0 0 0 0 rgba(178,91,76,.55);} 50%{ box-shadow:0 0 0 10px rgba(178,91,76,0);} }

  .stepper-track{ display:flex; gap:5px; width:100%; padding:0 4px; margin-bottom:4px; }
  .stepper-track .seg{ flex:1; height:4px; border-radius:2px; background:var(--line); overflow:hidden; }
  .stepper-track .seg .fill{ height:100%; background:var(--grad); width:0%; }
  .stepper-track .seg.done .fill{ width:100%; }

  .done-screen{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; text-align:center; }
  .done-screen .mark{ font-size:56px; color:var(--good); }
  .done-screen h2{ font-size:26px; }
  .done-screen p{ color:var(--muted); font-size:14px; }

  ::-webkit-scrollbar{ display:none; }

  /* ---------- STATS ---------- */
  .stat-card{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:6px; }
  .cal-grid{ display:grid; grid-template-columns: repeat(14, 1fr); gap:5px; }
  .cal-dot{ aspect-ratio:1; border-radius:4px; background:var(--surface-2); }
  .cal-dot.on{ background:var(--grad); }
  .stat-foot{ margin-top:12px; font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--muted); }
  .bar-row{ display:flex; align-items:center; gap:10px; margin:8px 0; }
  .bar-name{ width:34%; font-size:13.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bar-track{ flex:1; height:8px; background:var(--surface-2); border-radius:4px; overflow:hidden; }
  .bar-fill{ height:100%; background:var(--grad); border-radius:4px; }
  .bar-val{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--muted); width:52px; text-align:right; }
  .dev-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:7px 0; border-bottom:1px solid var(--line); font-size:14px; }
  .dev-row:last-child{ border-bottom:none; }
  .dev-row b.late{ color:var(--danger); }
  .dev-row b.early{ color:var(--good); }
  .dev-row b.ontime{ color:var(--accent); }
  .dev-n{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--muted); }

  /* ---------- ZEN MODE ---------- */
  .zen-screen{ justify-content:center; }
  .zen-wrap{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; text-align:center; }
  .zen-label{ font-family:'Fraunces', serif; font-size:22px; color:var(--muted); }
  .zen-time{ font-family:'IBM Plex Mono', monospace; font-size:min(26vw, 120px); font-weight:500; letter-spacing:-2px; line-height:1; }
  .zen-time.overtime{ color:var(--danger); }
  .zen-sub{ font-family:'IBM Plex Mono', monospace; font-size:13px; color:var(--muted); }
  .zen-sub b{ color:var(--accent); }

  /* ---------- DAY CHIPS / REST / SELECT ---------- */
  .day-chips{ display:flex; gap:6px; margin-top:14px; }
  .day-chip{
    flex:1; text-align:center; padding:8px 0; border-radius:9px; background:var(--surface-2);
    color:var(--muted); font-family:'IBM Plex Mono', monospace; font-size:13px; border:1px solid var(--line);
  }
  .day-chip.active{ background:var(--grad); color:var(--on-accent); border-color:transparent; }
  .routine-select{
    background:var(--surface-2); border:1px solid var(--line); border-radius:10px; color:var(--text);
    font-family:'Inter'; font-size:14px; padding:8px 10px; width:100%;
  }
  .stepper-track .seg.rest .fill{ background:var(--good); }
  .dial-wrap.restdial .dial-time .label{ color:var(--good); }

  /* ---------- NOTES: SEARCH & PIN ---------- */
  .note-search{
    background:var(--surface); border:1px solid var(--line); border-radius:12px; color:var(--text);
    font-family:'Inter'; font-size:15px; padding:11px 14px; width:100%; margin-bottom:14px;
  }
  .note-search:focus{ outline:none; border-color:var(--accent); }
  .pin-btn{ color:var(--line); font-size:18px; }
  .pin-btn.pinned{ color:var(--accent); border-color:var(--accent-dim); }
  .pin-mark{ color:var(--accent); font-size:14px; }

  /* ---------- CONFIRM MODAL ---------- */
  .confirm-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:1000;
    display:flex; align-items:center; justify-content:center; padding:30px;
    animation: fade .15s ease;
  }
  .confirm-box{
    background:var(--surface); border:1px solid var(--line); border-radius:18px;
    padding:22px; max-width:320px; width:100%;
  }
  .confirm-box p{ margin:0 0 18px; font-size:15.5px; line-height:1.5; }
  .confirm-box small{ color:var(--muted); }
  .confirm-actions{ display:flex; gap:10px; }
  .confirm-actions button{ flex:1; border-radius:12px; padding:13px; font-size:15px; font-family:'Inter'; }
  .btn-cancel{ background:var(--surface-2); border:1px solid var(--line); color:var(--text); }
  .btn-confirm{ background:var(--danger); border:none; color:#fff; font-weight:600; }

  /* ---------- TAGS & WIKILINKS ---------- */
  .tag-bar{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
  .tag-chip{
    padding:5px 11px; border-radius:20px; background:var(--surface); border:1px solid var(--line);
    color:var(--muted); font-family:'IBM Plex Mono', monospace; font-size:12.5px;
  }
  .tag-chip.active{ background:var(--grad); color:var(--on-accent); border-color:transparent; }
  .tag-token{ color:var(--accent); }
  .wikilink{ color:var(--accent-2); text-decoration:underline; text-underline-offset:3px; }

  /* ---------- IDENTIDADE VISUAL DA ROTINA ---------- */
  .ident-row{ display:flex; align-items:center; gap:14px; margin:-6px 0 18px; }
  .icon-input{
    width:52px; height:44px; text-align:center; font-size:22px; background:var(--surface);
    border:1px solid var(--line); border-radius:12px; color:var(--text);
  }
  .icon-input:focus{ outline:none; border-color:var(--accent); }
  .color-chips{ display:flex; gap:9px; }
  .color-chip{ width:28px; height:28px; border-radius:50%; border:2px solid transparent; }
  .color-chip.sel{ border-color:var(--text); }
  .r-dot{ display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:7px; vertical-align:1px; }

  /* ---------- PLAYER EXTRAS ---------- */
  .skip-btn{
    background:none; border:1px dashed var(--line); color:var(--muted); border-radius:10px;
    padding:8px 16px; font-size:13.5px; font-family:'Inter';
  }
  .resume-card{ border-color:var(--accent-dim); margin-bottom:4px; }
  .resume-card h3{ color:var(--accent); font-size:16px; }

  /* ---------- AVISOS / UNDO ---------- */
  .notice-card{
    background:var(--surface); border:1px dashed var(--accent-dim); border-radius:14px;
    padding:14px 16px; margin-bottom:12px; font-size:13.5px; line-height:1.45;
    display:flex; flex-direction:column; gap:10px;
  }
  .notice-actions{ display:flex; gap:8px; }
  .notice-actions button{
    background:var(--grad); color:var(--on-accent); border:none; border-radius:9px;
    padding:8px 16px; font-size:13.5px; font-family:'Inter'; font-weight:600;
  }
  .notice-actions button.ghost{ background:var(--surface-2); color:var(--muted); font-weight:400; }
  .undo-banner{ display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .undo-btn{
    background:rgba(255,255,255,.25); border:none; color:var(--on-accent); border-radius:8px;
    padding:7px 14px; font-size:13.5px; font-weight:700; font-family:'Inter'; flex-shrink:0;
  }

  /* ---------- DRAG ---------- */
  .drag-handle{ color:var(--muted); font-size:17px; padding:2px 8px; cursor:grab; touch-action:none; user-select:none; }
  .step-row.dragging{ opacity:.45; border-color:var(--accent); }
  .step-row.drop-above{ box-shadow: 0 -3px 0 0 var(--accent); }
  .step-row.drop-below{ box-shadow: 0 3px 0 0 var(--accent); }

  /* ---------- NOTE OVERLAY ---------- */
  .note-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:900;
    display:flex; align-items:flex-end; justify-content:center; animation: fade .2s ease;
  }
  .note-overlay-box{
    background:var(--bg); border:1px solid var(--line); border-radius:22px 22px 0 0;
    width:100%; max-height:75vh; display:flex; flex-direction:column;
    padding:18px 20px calc(18px + var(--safe-bottom));
  }
  .note-overlay-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .note-overlay-top h3{ font-size:19px; }
  .note-overlay-body{ overflow-y:auto; user-select:text; }
  .note-link-btn{ border-style:solid; color:var(--accent-2); border-color:var(--accent-2); }
  .note-link-select{ font-size:13px; padding:6px 8px; color:var(--muted); }

  /* ---------- AGENDA ---------- */
  .agenda-row{ cursor:pointer; }
  .agenda-time{ font-family:'IBM Plex Mono', monospace; font-size:12.5px; color:var(--muted); width:96px; flex-shrink:0; }
  .agenda-today{ border-color:var(--accent-dim); }

  /* ---------- TREND ---------- */
  .trend-chart{ display:flex; align-items:flex-end; gap:6px; }
  .trend-col{ flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
  .trend-bar-area{ height:64px; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:3px; }
  .trend-bar{ width:70%; max-width:26px; border-radius:4px 4px 0 0; }
  .trend-bar.late{ background:var(--danger); }
  .trend-bar.early{ background:var(--good); }
  .trend-bar.ontime{ background:var(--grad); }
  .trend-val{ font-family:'IBM Plex Mono', monospace; font-size:9.5px; color:var(--muted); }
  .trend-lbl{ font-family:'IBM Plex Mono', monospace; font-size:9.5px; color:var(--muted); }

  /* ---------- HEATMAP (estilo GitHub) ---------- */
  .hm-scroll{ overflow-x:auto; padding-bottom:4px; }
  .hm-months{ display:flex; gap:3px; margin-bottom:4px; }
  .hm-mlabel{ width:13px; flex-shrink:0; font-family:'IBM Plex Mono', monospace; font-size:9px; color:var(--muted); overflow:visible; white-space:nowrap; }
  .hm-grid{ display:flex; gap:3px; }
  .hm-col{ display:flex; flex-direction:column; gap:3px; }
  .hm-cell{ width:13px; height:13px; border-radius:3px; background:var(--surface-2); flex-shrink:0; }
  .hm-cell.hm-void{ background:transparent; }
  .hm-cell.lv1{ background:#EC6AA84D; }
  .hm-cell.lv2{ background:#C973BE99; }
  .hm-cell.lv3{ background:#8B7FD9CC; }
  .hm-cell.lv4{ background:#5B8DEF; }
  body.light .hm-cell.lv1{ background:#EC6AA855; }
  .hm-cell.hm-sel{ outline:2px solid var(--text); outline-offset:1px; }
  .hm-legend{ display:flex; align-items:center; gap:5px; margin-top:8px; font-family:'IBM Plex Mono', monospace; font-size:10px; color:var(--muted); }

  /* ---------- NAVEGAÇÃO E CALENDÁRIO MENSAL ---------- */
  .stats-nav{ margin-bottom:12px; display:flex; }
  .view-toggle, .period-toggle{ width:100%; }
  .view-toggle span, .period-toggle span{ flex:1; text-align:center; }
  .cal-nav{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .cal-title{ font-family:'Fraunces', serif; font-size:20px; font-weight:600; }
  .mcal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .mcal-dowlbl{ text-align:center; font-family:'IBM Plex Mono', monospace; font-size:10px; color:var(--muted); padding-bottom:2px; }
  .mcal-cell{
    aspect-ratio:.85; border-radius:8px; background:var(--surface-2); position:relative;
    display:flex; flex-direction:column; align-items:center; padding-top:4px; gap:2px;
  }
  .mcal-cell.mcal-void{ background:transparent; }
  .mcal-num{ font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--muted); }
  .mcal-today .mcal-num{ color:var(--accent); font-weight:700; }
  .mcal-today{ outline:1.5px solid var(--accent-dim); }
  .mcal-sel{ outline:2px solid var(--text); }
  .mcal-dots{ display:flex; gap:2px; flex-wrap:wrap; justify-content:center; max-width:90%; }
  .mcal-dot{ width:6px; height:6px; border-radius:50%; }
  .mcal-missed{
    position:absolute; top:2px; right:3px; font-family:'IBM Plex Mono', monospace;
    font-size:9px; color:var(--danger); font-weight:700;
  }

  /* ---------- EMPILHADO POR DIA / HISTOGRAMA HORA ---------- */
  .stack-chart{ display:flex; gap:8px; align-items:flex-end; }
  .stack-col{ flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
  .stack-bars{ display:flex; flex-direction:column-reverse; width:70%; max-width:30px; min-height:2px; }
  .stack-seg{ width:100%; }
  .stack-seg:first-child{ border-radius:0 0 3px 3px; }
  .stack-seg:last-child{ border-radius:3px 3px 0 0; }
  .hour-chart{ display:flex; gap:2px; align-items:flex-end; height:72px; }
  .hour-col{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; }
  .hour-bar{ width:100%; max-width:12px; background:var(--grad); border-radius:2px 2px 0 0; }
  .tappable{ cursor:pointer; }
  .tappable:active{ opacity:.6; }

  /* ---------- HUMOR / METAS / EXCLUIR EXEC ---------- */
  .mood-row{ display:flex; gap:12px; margin-top:14px; }
  .mood-btn{ background:var(--surface); border:1px solid var(--line); border-radius:14px; font-size:26px; padding:8px 10px; }
  .mood-btn.sel{ border-color:var(--accent); background:var(--surface-2); transform:scale(1.12); }
  .goal-track{ position:relative; }
  .goal-marker{ position:absolute; top:-3px; bottom:-3px; width:2px; background:var(--text); opacity:.65; border-radius:1px; }
  .del-exec{ background:none; border:none; color:var(--muted); font-size:13px; padding:2px 6px; flex-shrink:0; }
  .del-exec:active{ color:var(--danger); }
  .suggest-row{ display:flex; align-items:center; justify-content:space-between; gap:8px; padding:2px 0 8px 12px; }
  .suggest-btn{
    background:var(--surface-2); border:1px dashed var(--accent-dim); color:var(--accent);
    border-radius:8px; padding:5px 12px; font-size:12.5px; font-family:'IBM Plex Mono', monospace;
  }
  .cyc-inp{ background:var(--surface-2) !important; border:1px solid var(--line) !important; border-radius:8px !important; padding:7px 8px !important; color:var(--text) !important; font-size:15px !important; }

  /* ---------- MODELOS ---------- */
  .tmpl-new-row{ display:flex; gap:10px; margin-bottom:18px; }
  .tmpl-new{
    flex:1; background:var(--surface); border:1px dashed var(--accent-dim); border-radius:16px;
    padding:16px 10px; color:var(--text); font-family:'Inter'; font-size:14px;
    display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  .tmpl-ic{ font-size:24px; }
  .market-form{ margin-bottom:14px; }
  .market-form input[type=text]{
    width:100%; background:var(--surface); border:1px solid var(--line); border-radius:12px;
    color:var(--text); font-size:15px; padding:11px 14px; margin-bottom:8px;
  }
  .market-form input[type=text]:focus{ outline:none; border-color:var(--accent); }
  .market-form-row{ display:flex; gap:8px; }
  .market-form-row input, .market-form-row select{
    background:var(--surface); border:1px solid var(--line); border-radius:10px;
    color:var(--text); font-size:14px; padding:9px 8px;
  }
  .market-form-row input{ width:64px; }
  .market-form-row select{ flex:1; min-width:0; }
  .matrix-grid{
    flex:1; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr;
    gap:10px; overflow-y:auto; padding-bottom:16px; min-height:0;
  }
  .matrix-quad{
    border:1.5px solid; border-radius:14px; padding:10px; display:flex; flex-direction:column;
    min-height:190px; overflow:hidden;
  }
  .mx-title{
    background:none; border:none; font-family:'Fraunces', serif; font-weight:600; font-size:14px;
    width:100%; padding:0 0 4px;
  }
  .mx-title:focus{ outline:none; }
  .mx-tools{ display:flex; align-items:center; justify-content:space-between; gap:6px; margin-bottom:6px; }
  .mx-colors{ display:flex; gap:4px; }
  .mx-items{ flex:1; overflow-y:auto; min-height:0; }
  .mx-add input{
    width:100%; background:transparent; border:none; border-top:1px dashed var(--line);
    color:var(--text); font-size:13px; padding:7px 2px 2px;
  }
  .mx-add input:focus{ outline:none; }

  /* ---------- MERCADO v2 ---------- */
  .mk-chips{ display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom:8px; }
  .mk-item{ gap:8px; }
  .mk-name{ flex:1; min-width:0; overflow-wrap:break-word; }
  .mk-right{ margin-left:auto; flex-shrink:0; font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--muted); text-align:right; }
  .mk-edit{ background:var(--surface-2); border-radius:10px; padding:10px; margin:6px 0; }
  .mk-e-name{ width:100%; background:var(--surface); border:1px solid var(--line); border-radius:9px; color:var(--text); font-size:14.5px; padding:9px 10px; margin-bottom:8px; }
  .mk-e-name:focus{ outline:none; border-color:var(--accent); }
  .shop-counter{ font-family:'IBM Plex Mono', monospace; font-size:44px; text-align:center; padding:8px 0 2px; background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .shop-counter span{ font-size:14px; color:var(--muted); -webkit-text-fill-color:var(--muted); }
  .tmpl-new-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:18px; }

  /* ---------- MATRIZ v2 ---------- */
  .matrix-single{ flex:1; display:flex; min-height:0; }
  .matrix-single .matrix-quad{ flex:1; min-height:0; }
  .mx-editbox{ background:var(--surface); border-radius:9px; padding:8px; margin:4px 0; }
  .mx-e-text{ width:100%; background:var(--surface-2); border:1px solid var(--line); border-radius:8px; color:var(--text); font-size:14px; padding:8px 9px; margin-bottom:6px; }
  .mx-e-text:focus{ outline:none; border-color:var(--accent); }
  .mx-e-tools{ display:flex; align-items:center; gap:2px; margin-bottom:6px; flex-wrap:wrap; }
  .mx-e-quad{ flex:1; min-width:0; background:var(--surface-2); border:1px solid var(--line); border-radius:8px; color:var(--text); font-size:12px; padding:6px; }
  .mx-axes{ display:flex; gap:8px; margin-bottom:8px; }
  .mx-axes input{ flex:1; background:var(--surface); border:1px solid var(--line); border-radius:9px; color:var(--text); font-size:13px; padding:8px 10px; }
  .mx-axis-x{ text-align:center; font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--muted); margin-bottom:4px; }
  .mx-axis-y{ writing-mode:vertical-rl; transform:rotate(180deg); font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--muted); display:flex; align-items:center; }

  /* ---------- KANBAN ---------- */
  .kb-board{ flex:1; display:flex; gap:8px; overflow-x:auto; padding-bottom:14px; min-height:0; }
  .kb-col{ flex:0 0 72%; max-width:280px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:10px; display:flex; flex-direction:column; min-height:0; }
  .kb-head{ font-family:'Fraunces', serif; font-weight:600; font-size:15px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
  .kb-cards{ flex:1; overflow-y:auto; min-height:60px; }
  .kb-card{ background:var(--surface-2); border:1px solid var(--line); border-radius:10px; padding:9px 10px; margin-bottom:7px; display:flex; align-items:center; gap:6px; }
  .kb-text{ flex:1; font-size:14px; min-width:0; overflow-wrap:break-word; }
  .kb-moves{ display:flex; flex-shrink:0; }
  .kb-add{ width:100%; background:transparent; border:none; border-top:1px dashed var(--line); color:var(--text); font-size:13.5px; padding:8px 2px 2px; }
  .kb-add:focus{ outline:none; }

  /* ---------- CONTAGEM / PESOS ---------- */
  .cd-big{ font-family:'IBM Plex Mono', monospace; font-size:40px; font-weight:500; }
  .cd-big span{ font-size:14px; color:var(--muted); }
  .cd-big.late{ color:var(--danger); }
  .cd-big.ontime{ color:var(--accent); }
  .cd-big.early{ color:var(--good); }
  .cd-topics{ display:flex; align-items:center; gap:12px; margin-top:8px; }
  .cd-done-inp{ width:52px; background:var(--surface-2); border:1px solid var(--line); border-radius:8px; color:var(--text); font-family:'IBM Plex Mono', monospace; font-size:14px; padding:5px 6px; text-align:center; }
  .pc-weights{ display:flex; gap:3px; flex-shrink:0; }
  .pc-w{ width:24px; height:24px; border-radius:6px; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:var(--muted); }
</style>

<body>
<div id="app"></div>

<script>
(function(){
  "use strict";

  /* ---------------- STORAGE ---------------- */
  const K_ROUTINES = "rotinas_v2_routines";
  const K_HISTORY  = "rotinas_v2_history";
  const K_NOTES    = "rotinas_v2_notes";
  const K_ALERTED  = "rotinas_v2_alerted";
  const K_PLAYER   = "rotinas_v2_player";
  const K_THEME    = "rotinas_v2_theme";
  const K_LASTBACKUP = "rotinas_v2_lastbackup";
  const K_TEMPLATES = "rotinas_v2_templates";
  const K_SNOOZES   = "rotinas_v2_snoozes";
  const K_TAREFAS  = "rotinas_v2_tarefas";
  const K_TAREFAS_HIST = "rotinas_v2_tarefas_hist";

  const mqLight = window.matchMedia ? window.matchMedia("(prefers-color-scheme: light)") : null;
  function resolvedTheme(){
    const t = load(K_THEME, "auto");
    if(t === "auto") return (mqLight && mqLight.matches) ? "light" : "dark";
    return t;
  }
  function applyTheme(){
    const eff = resolvedTheme();
    document.body.classList.toggle("light", eff === "light");
    const meta = document.querySelector('meta[name="theme-color"]');
    if(meta) meta.setAttribute("content", eff === "light" ? "#F6F2EC" : "#1C1B1A");
  }
  function themeIcon(){
    const t = load(K_THEME, "auto");
    return t === "auto" ? "&#9681;" : (t === "light" ? "&#9728;" : "&#9790;");
  }
  function toggleTheme(){
    const order = ["auto","light","dark"];
    const cur = load(K_THEME, "auto");
    const next = order[(order.indexOf(cur)+1) % 3];
    save(K_THEME, next);
    applyTheme();
    showAlertBanner("Tema: " + (next==="auto"?"automático (sistema)":next==="light"?"claro":"escuro"));
    render();
  }
  if(mqLight && mqLight.addEventListener) mqLight.addEventListener("change", ()=>{ if(load(K_THEME,"auto")==="auto") applyTheme(); });

  function load(key, fallback){ try{ const v = JSON.parse(localStorage.getItem(key)); return v === null ? fallback : v; }catch(e){ return fallback; } }
  function save(key, val){ localStorage.setItem(key, JSON.stringify(val)); }

  let routines = load(K_ROUTINES, []);
  let history  = load(K_HISTORY, []);
  let notes    = load(K_NOTES, []);
  let templates = load(K_TEMPLATES, []);
  let snoozes   = load(K_SNOOZES, []); // [{from,to}] períodos com agenda pausada
  
  const EIXOS = [
    { id:"autonomia",   label:"Autonomia",             area:"Culinária",     color:"#C9B23E" },
    { id:"idiomas",     label:"Idiomas",               area:"Mandarim",      color:"#E0619E" },
    { id:"concursos",   label:"Concursos",             area:"Contabilidade", color:"#5B8DEF" },
    { id:"exercicios",  label:"Exercícios Físicos",    area:"Musculação",    color:"#6B8F71" },
    { id:"sistemico",   label:"Conhecimento Sistêmico",area:"Medicina",      color:"#B25B4C" }
  ];
  let tarefas  = load(K_TAREFAS, []);
  let tarefasHist = load(K_TAREFAS_HIST, []);
  tarefas.forEach((m,i)=>{ if(m.ord===undefined) m.ord=i; });

  let view = { tab: "home", screen: "home" };
  let editorDraft = null;
  let noteDraft = null;
  let noteMode = "edit"; // edit | read
  let playerState = null;
  let timerHandle = null;
  let schedulerHandle = null;

  const app = document.getElementById("app");

  function uid(){ return Math.random().toString(36).slice(2, 10); }
  function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
  function fmtTime(totalSeconds){
    const neg = totalSeconds < 0;
    const abs = Math.abs(totalSeconds);
    const m = Math.floor(abs/60), s = Math.floor(abs%60);
    return (neg?"+":"") + String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
  }
  function fmtClock(date){ return String(date.getHours()).padStart(2,"0") + ":" + String(date.getMinutes()).padStart(2,"0"); }
  function localKey(d){
    d = d || new Date();
    const p = n => String(n).padStart(2,"0");
    return d.getFullYear() + "-" + p(d.getMonth()+1) + "-" + p(d.getDate());
  }

  function routineDuration(r){ return playbackSteps(r).reduce((acc,s)=> acc + (s.type==="timer" ? (s.seconds||0) : 0), 0); }

  // normalizar dados de versões anteriores
  routines.forEach(r=>{
    if(!r.schedule) r.schedule = { enabled:false, anchor:"start", time:"07:00" };
    if(!r.schedule.days) r.schedule.days = [0,1,2,3,4,5,6];
    if(r.restSeconds === undefined) r.restSeconds = 0;
    if(r.color === undefined || r.color === "#C98A3E") r.color = "grad";
    if(r.icon === undefined) r.icon = "";
    if(r.weeklyGoalMin === undefined) r.weeklyGoalMin = 0;
    if(r.sound === undefined) r.sound = "normal";
    if(r.createdAt === undefined){
      const firstRun = history.filter(h=>h.routineId===r.id && h.ts).sort((a,b)=>a.ts-b.ts)[0];
      r.createdAt = firstRun ? firstRun.ts : Date.now();
    }
  });
  notes.forEach(n=>{ if(n.pinned === undefined) n.pinned = false; if(n.sinkChecked === undefined) n.sinkChecked = false; });
  save(K_ROUTINES, routines);

  /* ---------------- CONFIRMAÇÃO ---------------- */
  function confirmModal(msg, confirmLabel, onYes){
    const ov = document.createElement("div");
    ov.className = "confirm-overlay";
    ov.innerHTML = `
      <div class="confirm-box">
        <p>${msg}</p>

  const GRAD_CSS = "linear-gradient(135deg,#EC6AA8,#5B8DEF)";
  function fillStyle(c){ return (!c || c === "grad" || c === "#C98A3E") ? GRAD_CSS : c; }
  function solidColor(c){ return (!c || c === "grad" || c === "#C98A3E") ? "#B96BC4" : c; }

  function computeStreakFor(routineId){
    const r = routines.find(x=>x.id===routineId);
    const days = new Set(history.filter(h=>h.routineId===routineId).map(h=>h.date));
    if(days.size===0) return 0;
    // rotina agendada em dias específicos: dias fora da agenda não contam nem quebram
    const schedDays = (r && r.schedule && r.schedule.enabled && r.schedule.days && r.schedule.days.length < 7) ? r.schedule.days : null;
    const todayKey = localKey();
    let streak = 0, d = new Date(), guard = 0;
    while(guard++ < 3700){
      const key = localKey(d);
      const dow = d.getDay();
      if(schedDays && !schedDays.includes(dow)){ d.setDate(d.getDate()-1); continue; }
      if(days.has(key)){ streak++; d.setDate(d.getDate()-1); }
      else if(key === todayKey){ d.setDate(d.getDate()-1); } // hoje ainda em curso não quebra
      else break;
    }
    return streak;
  }

  function computeStreak(){
    if(history.length===0) return 0;
    const days = new Set(history.map(h=>h.date));
    const todayKey = localKey();
    let streak=0, d=new Date(), guard=0;
    while(guard++ < 3700){
      const key = localKey(d);
      if(days.has(key)){ streak++; d.setDate(d.getDate()-1); }
      else if(key === todayKey){ d.setDate(d.getDate()-1); } // hoje em curso não quebra
      else break;
    }
    return streak;
  }

  /* ---------------- SOUND / HAPTICS ---------------- */
  let audioCtx = null;
  function beep(freq, dur){
    try{
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type="sine"; o.frequency.value=freq;
      g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.25, audioCtx.currentTime+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime+dur+0.02);
    }catch(e){}
  }
  function vibrate(pattern){ if(navigator.vibrate) navigator.vibrate(pattern); }
  function soundMode(routine){
    const r = routine || (typeof playerState !== "undefined" && playerState ? playerState.routine : null);
    return (r && r.sound) || "normal";
  }
  function cueBeep(freq, dur, mode){
    if(mode === "mudo") return;
    if(mode === "suave") beep(freq*0.75, dur*0.8);
    else beep(freq, dur);
  }
  function stepTransitionCue(){ const m = soundMode(); cueBeep(880,0.15,m); vibrate([40,30,40]); }
  function timeUpCue(){ const m = soundMode(); cueBeep(760,0.18,m); vibrate([60,50,60]); }
  function finishCue(){ const m = soundMode(); cueBeep(660,0.12,m); setTimeout(()=>cueBeep(990,0.22,m),140); vibrate([50,60,50,60,120]); }
  function alarmCue(routine){ const m = soundMode(routine); cueBeep(720,0.3,m); setTimeout(()=>cueBeep(720,0.3,m),420); setTimeout(()=>cueBeep(720,0.4,m),840); vibrate([200,100,200,100,200]); }

  /* ---------------- SCHEDULE HELPERS ---------------- */
  function formatHM(min){ min=((min%1440)+1440)%1440; const h=Math.floor(min/60), m=min%60; return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0"); }
  function computeSchedule(routine){
    if(!routine.schedule || !routine.schedule.enabled || !routine.schedule.time) return null;
    const durMin = Math.round(routineDuration(routine)/60);
    const [h,m] = routine.schedule.time.split(":").map(Number);
    const anchorMin = h*60+m;
    let startMin, endMin;
    if(routine.schedule.anchor === "end"){ endMin = anchorMin; startMin = anchorMin - durMin; }
    else { startMin = anchorMin; endMin = anchorMin + durMin; }
    return { startMin: ((startMin%1440)+1440)%1440, endMin: ((endMin%1440)+1440)%1440, startStr: formatHM(startMin), endStr: formatHM(endMin), durMin };
  }

  function checkSchedules(){
    if(agendaSnoozed()) return;
    const now = new Date();
    const nowMin = now.getHours()*60 + now.getMinutes();
    const todayStr = localKey(now);
    let alerted = load(K_ALERTED, {});
    let changed = false;
    routines.forEach(r=>{
      const sched = computeSchedule(r);
      if(!sched) return;
      if(r.schedule.days && !r.schedule.days.includes(now.getDay())) return;
      if(alerted[r.id] === todayStr) return;
      const GRACE_MIN = 60;
      const diff = nowMin - sched.startMin;
      if(diff >= 0 && diff <= GRACE_MIN){
        alerted[r.id] = todayStr; changed = true;
        alarmCue(r);
        const msg = diff === 0 ? "Hora de começar: " + r.name : "Rotina atrasada (" + diff + "min): " + r.name;
        showRichNotification(msg, diff===0 ? "Início previsto às " + sched.startStr : "Estava prevista para " + sched.startStr + " — começar agora?", r.id);
        showAlertBanner("⏰ " + msg, ()=>{ startPlayer(r.id); });
      }
    });
    if(changed) save(K_ALERTED, alerted);
  }
  function startScheduler(){ if(schedulerHandle) return; schedulerHandle = setInterval(checkSchedules, 20000); checkSchedules(); }

          const dragRow = rows[from];

          handle.setPointerCapture(ev.pointerId);
          let target = from;
          const move = e2 => {
            const y = e2.clientY;
            target = from;
            rows.forEach((row,j)=>{
              const rect = row.getBoundingClientRect();
              const mid = rect.top + rect.height/2;
              row.classList.remove("drop-above","drop-below");
              if(j !== from){
                if(y < mid && j < from) target = Math.min(target, j);

              }
            });
            if(target !== from && rows[target]){
              rows[target].classList.add(target < from ? "drop-above" : "drop-below");
            }
          };
          const up = () => {
            handle.releasePointerCapture(ev.pointerId);

            dragRow.classList.remove("dragging");
            rows.forEach(r=>r.classList.remove("drop-above","drop-below"));

  /* ================= NOTES ================= */
  function stripMdForSnippet(content){
    return content.replace(/^#+\s*/gm,"").replace(/[*_~`]/g,"").replace(/(-\s*)?\[[ xX]?\]\s*/g,"").replace(/\n+/g," ").trim().slice(0,90);
  }
  function relativeTime(ts){
    const diff = Date.now() - ts;
    const min = Math.floor(diff/60000);
    if(min < 1) return "agora";
    if(min < 60) return min+"min";
    const h = Math.floor(min/60);
    if(h < 24) return h+"h";
    const d = Math.floor(h/24);
    return d+"d";
  }

  let notesQuery = "";
  let notesTag = null;

  function extractTags(n){
    const src = (n.title||"") + " " + (n.content||"");
    const out = new Set();
    const re = /(^|\s)#([\p{L}0-9_\-]+)/gu;
    let m;
    while((m = re.exec(src))) out.add(m[2].toLowerCase());
    return [...out];
  }
  function allTags(){
    const t = new Set();
    notes.forEach(n=> extractTags(n).forEach(x=>t.add(x)));
    return [...t].sort();
  }

  /* ================= MARMITAS ================= */
  let tarefaDurFilter = 0; // 0 = todas
  let tarefaCollapsed = load("rotinas_v2_tar_collapsed", {});
  let tarefaDraft = null;
  let tarefaTimerState = null;

  function saveTarefas(){ save(K_TAREFAS, tarefas); }
  function saveTarefasHist(){ save(K_TAREFAS_HIST, tarefasHist); }
  function eixoInfo(id){ return EIXOS.find(e=>e.id===id) || EIXOS[0]; }

  function normalizeStr(s){ return (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim(); }
  function matchEixo(name){
    const n = normalizeStr(name);
    return EIXOS.find(e=> normalizeStr(e.label)===n || normalizeStr(e.id)===n || normalizeStr(e.area)===n);
  }

  function importTarefasMd(file){
    const reader = new FileReader();
    reader.onload = () => {
      const lines = String(reader.result).split(/\r?\n/);
      let curEixo = null, curArea = "", curTipo = "", curDur = 15;
      let added = 0, skipped = 0;
      const novos = [];
      let ord = tarefas.length ? Math.max(...tarefas.map(m=>m.ord))+1 : 0;
      lines.forEach(raw=>{
        const t = raw.trim();
        if(!t) return;
        let m;
        if((m = t.match(/^#\s+(.+)$/))){
          // H1: "Eixo — Área" | "Eixo - Área" | "Eixo: Área" | "Eixo"
          const parts = m[1].split(/\s+[—–\-:]\s+/);
          const ex = matchEixo(parts[0]);
          if(ex){ curEixo = ex.id; curArea = (parts[1]||ex.area).trim(); }
          else { curEixo = null; skipped++; }
          return;
        }
        if((m = t.match(/^##+\s+(.+)$/))){
          // H2: "Tipo (15 min)" | "Tipo (15)" | "Tipo"
          let tipo = m[1];
          const dm = tipo.match(/\(\s*(\d+)\s*(?:min)?\s*\)\s*$/i);
          curDur = dm ? +dm[1] : 15;
          if(![15,30,60].includes(curDur)) curDur = curDur<=20?15:curDur<=45?30:60;
          curTipo = tipo.replace(/\(\s*\d+\s*(?:min)?\s*\)\s*$/i,"").trim();
          return;
        }
        if((m = t.match(/^[->*]\s+(.+)$/))){
          // item: "- Conteúdo ×3" | "- Conteúdo x3" | "- Conteúdo (x3)" | "> Conteúdo"
          if(!curEixo || !curTipo){ skipped++; return; }
          let conteudo = m[1].trim();
          let copias = 1;
          const cm = conteudo.match(/[\(\s][x×]\s*(\d+)\)?\s*$/i);
          if(cm){ copias = Math.min(9, Math.max(1, +cm[1])); conteudo = conteudo.replace(/[\(\s][x×]\s*\d+\)?\s*$/i,"").trim(); }
          for(let c=0;c<copias;c++){ novos.push({ id:uid(), eixo:curEixo, area:curArea, tipo:curTipo, conteudo, dur:curDur, lastDone:null, ord:ord++ }); added++; }
          return;
        }
      });
      if(added===0){
        showAlertBanner("Nada importado — verifique o formato (# eixo, ## tipo (min), - conteúdo)");
        return;
      }
      tarefas.push(...novos); saveTarefas();
      showAlertBanner(added+" tarefa(s) importada(s) ✓" + (skipped?` · ${skipped} linha(s) ignorada(s)`:""));
      render();
    };
    reader.readAsText(file);
  }

  function concludeTarefa(m){
    const prev = m.lastDone;
    m.lastDone = Date.now(); saveTarefas();
    const histEntry = { id:uid(), tarefaId:m.id, eixo:m.eixo, area:m.area, tipo:m.tipo, conteudo:m.conteudo, dur:m.dur, ts:m.lastDone };
    tarefasHist.push(histEntry); saveTarefasHist();
    finishCue();
    showUndoBanner("Tarefa concluída ✓", ()=>{
      m.lastDone = prev; saveTarefas();
      tarefasHist = tarefasHist.filter(h=>h.id!==histEntry.id); saveTarefasHist();
      render();
    });
  }

  function notifyTarefaTimeUp(m){
    if(!("Notification" in window) || Notification.permission !== "granted") return;
    const title = "\u23F1 Tempo esgotado";
    const body = m.tipo + ": " + m.conteudo + " (" + m.dur + " min)";
    if("serviceWorker" in navigator){
      navigator.serviceWorker.ready.then(reg=>{
        reg.showNotification(title, { body, tag:"tarefa-"+m.id, vibrate:[200,100,200] })
          .catch(()=>{ try{ new Notification(title,{body}); }catch(e){} });
      });
    } else { try{ new Notification(title,{body}); }catch(e){} }
  }

  function tarefaAgo(m){
    if(!m.lastDone) return "nunca feita";
    const days = Math.floor((Date.now()-m.lastDone)/86400000);
    if(days<=0) return "feita hoje";
    if(days===1) return "feita ontem";
    return "há "+days+" dias";
  }

  /* ================= STATS ================= */
  let statsPeriod = "30d";       // 7d | 30d | 90d | ano | tudo
  let statsView = "resumo";      // resumo | mensal | anual
  let calMonth = new Date();     // mês exibido na visão mensal
  let calYear = new Date().getFullYear();
  let selectedDay = null;        // "YYYY-MM-DD" tocado

  function periodStartTs(){
    const now = Date.now();
    if(statsPeriod === "7d") return now - 7*86400000;
    if(statsPeriod === "30d") return now - 30*86400000;
    if(statsPeriod === "90d") return now - 90*86400000;
    if(statsPeriod === "ano") return now - 365*86400000;
    return 0;
  }
  function richInPeriod(){
    const startTs = periodStartTs();
    return history.filter(h=>h.ts && h.ts >= startTs);
  }
  function median(arr){
    if(!arr.length) return 0;
    const s = [...arr].sort((a,b)=>a-b);
    const mid = Math.floor(s.length/2);
    return s.length % 2 ? s[mid] : (s[mid-1]+s[mid])/2;
  }
  function dateKey(d){ return localKey(d); }
  function startTsOf(h){ return h.ts - ((h.actualSec||0)+(h.pausedSec||0))*1000; }

  function minutesByDate(entries){
    const map = {};
    entries.forEach(h=>{ map[h.date] = (map[h.date]||0) + Math.round((h.actualSec||0)/60); });
    return map;
  }
  function intensityClass(min){
    if(!min) return "lv0";
    if(min < 15) return "lv1";
    if(min < 45) return "lv2";
    if(min < 90) return "lv3";
    return "lv4";
  }

  function exportStatsCsv(){
    const rich = history.filter(h=>h.ts);
    if(rich.length === 0){ showAlertBanner("Sem execuções detalhadas para exportar"); return; }
    const rows = [["data","hora","rotina","planejado_s","real_s","desvio_s","pausas","pausado_s","etapas_puladas","atraso_min","humor_1a5"]];
    rich.forEach(h=>{
      const d = new Date(h.ts);
      rows.push([
        h.date, fmtClock(d), h.routineName,
        h.plannedSec != null ? h.plannedSec : "",
        h.actualSec != null ? h.actualSec : "",
        (h.plannedSec != null && h.actualSec != null) ? (h.actualSec - h.plannedSec) : "",
        h.pauses != null ? h.pauses : 0,
        h.pausedSec != null ? h.pausedSec : 0,
        h.skippedCount != null ? h.skippedCount : 0,
        h.schedDelayMin != null ? h.schedDelayMin : "",
        h.mood != null ? h.mood : ""
      ]);
    });
    const csv = "\ufeff" + rows.map(r=>r.map(v=>String(v).replace(/;/g,",")).join(";")).join("\n");
    downloadFile("rotinas-estatisticas.csv", csv, "text/csv;charset=utf-8");
    showAlertBanner("CSV exportado para Downloads ✓");
  }

  /* ---- painel de detalhe do dia tocado ---- */
  function dayDetailHtml(key){
    const d = new Date(key + "T12:00:00");
    const dow = d.getDay();
    const executed = history.filter(h=>h.date === key);
    const isPastOrToday = key <= dateKey(new Date());
    const planned = routines.filter(r=>r.schedule && r.schedule.enabled && r.schedule.days.includes(dow));
    let out = `<div class="section-label">${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}</div><div class="stat-card">`;
    if(executed.length === 0 && planned.length === 0){
      out += `<div class="dev-row"><span class="dev-n">Nada executado nem agendado.</span></div>`;
    } else {
      executed.forEach(h=>{
        const t = h.ts ? fmtClock(new Date(h.ts)) : "";
        const dur = h.actualSec != null ? fmtTime(h.actualSec).replace("+","") : "";
        out += `<div class="dev-row"><span>&#10003; ${escapeHtml(h.routineName)}</span><span class="dev-n">${dur}</span><span class="dev-n">${t}</span></div>`;
      });
      planned.forEach(r=>{
        const done = executed.some(h=>h.routineId === r.id);
        if(done) return;
        if(r.createdAt && d.getTime() < new Date(new Date(r.createdAt).setHours(0,0,0,0)).getTime()) return; // antes da criação
        if(snoozedOn(d)) return; // agenda pausada nesse dia
        const sched = computeSchedule(r);
        const status = isPastOrToday && key < dateKey(new Date()) ? '<b class="late">não feita</b>' : '<span class="dev-n">agendada</span>';
        out += `<div class="dev-row"><span>&#9675; ${escapeHtml(r.name)}</span><span class="dev-n">${sched?sched.startStr:""}</span>${status}</div>`;
      });
    }
    return out + `</div>`;
  }

  /* ---- heatmap estilo GitHub ---- */
  function heatmapHtml(fromDate, toDate, byDate){
    // alinhar início ao domingo
    const start = new Date(fromDate); start.setHours(12,0,0,0);
    start.setDate(start.getDate() - start.getDay());
    const end = new Date(toDate); end.setHours(12,0,0,0);
    const MONTHS = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
    let cols = "", monthLabels = "";
    let cur = new Date(start);
    let lastMonth = -1;
    while(cur <= end){
      let colCells = "";
      const weekStartMonth = cur.getMonth();
      for(let dow=0; dow<7; dow++){
        const key = dateKey(cur);
        const inRange = cur >= fromDate && cur <= toDate;
        const min = byDate[key] || 0;
        colCells += inRange
          ? `<span class="hm-cell ${intensityClass(min)} ${key===selectedDay?'hm-sel':''}" data-day="${key}" title="${key}: ${min}min"></span>`
          : `<span class="hm-cell hm-void"></span>`;
        cur.setDate(cur.getDate()+1);
      }
      monthLabels += `<span class="hm-mlabel">${weekStartMonth !== lastMonth ? MONTHS[weekStartMonth] : ""}</span>`;
      lastMonth = weekStartMonth;
      cols += `<div class="hm-col">${colCells}</div>`;
    }
    return `<div class="hm-scroll"><div class="hm-months">${monthLabels}</div><div class="hm-grid">${cols}</div></div>
      <div class="hm-legend"><span>menos</span><span class="hm-cell lv0"></span><span class="hm-cell lv1"></span><span class="hm-cell lv2"></span><span class="hm-cell lv3"></span><span class="hm-cell lv4"></span><span>mais</span></div>`;
  }
