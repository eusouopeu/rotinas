  function openNoteEditor(id){
    if(id){
      noteDraft = notes.find(n=>n.id===id);
    } else {
      noteDraft = { id: uid(), title:"", content:"", updatedAt: Date.now() };
      notes.push(noteDraft);
      save(K_NOTES, notes);
    }
    view = { tab:"notes", screen:"noteEditor" };
    render();
  }

  /* ---------- Live editor helpers ---------- */
  const RE_CHECK = /^(\s*)(-\s*)?\[( |x|X)?\]\s?(.*)$/;   // aceita "[]", "[ ]", "[x]", "- []", "- [ ]"
  const RE_HEAD  = /^(#{1,3})\s+(.*)$/;
  const RE_UL    = /^[-*]\s+(.*)$/;
  const RE_OL    = /^(\d+)\.\s+(.*)$/;
  const RE_TOGGLE = /^>\s?(.*)$/;                           // dialeto Notion: "> " cria lista toggle
  const RE_HR     = /^(-{3,}|\*{3,}|_{3,})$/;               // divisor "---"

  // estado de abertura/fechamento dos toggles (por nota, por linha — só na sessão)
  const toggleState = {};
  function toggleKey(noteId, idx){ return noteId + ":" + idx; }
  function isToggleCollapsed(noteId, idx){ return !!toggleState[toggleKey(noteId, idx)]; }
  function flipToggle(noteId, idx){ toggleState[toggleKey(noteId, idx)] = !toggleState[toggleKey(noteId, idx)]; }
  // filhos de um toggle: linhas seguintes até linha vazia, título, divisor ou outro toggle
  function toggleChildrenMap(lines){
    const childOf = {}; // idx da linha filha -> idx do toggle pai
    lines.forEach((raw, i)=>{
      if(!raw.trim().match(RE_TOGGLE)) return;
      for(let j=i+1; j<lines.length; j++){
        const t = lines[j].trim();
        if(t === "" || t.match(RE_TOGGLE) || t.match(RE_HEAD) || t.match(RE_HR)) break;
        childOf[j] = i;
      }
    });
    return childOf;
  }

  function mdInline(t){
    return t.replace(/\[\[([^\[\]]+?)\]\]/g,'<span class="wikilink" data-wikilink="$1">$1</span>')
            .replace(/(^|\s)#([\p{L}0-9_\-]+)/gu,'$1<span class="tag-token">#$2</span>')
            .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
            .replace(/\*(.+?)\*/g,"<em>$1</em>")
            .replace(/~~(.+?)~~/g,"<s>$1</s>")
            .replace(/`(.+?)`/g,"<code>$1</code>");
  }

  function openNoteByTitle(title){
    const t = title.trim().toLowerCase();
    let target = notes.find(n => (n.title||"").trim().toLowerCase() === t);
    if(!target){
      target = { id: uid(), title: title.trim(), content: "", updatedAt: Date.now(), pinned:false };
      notes.push(target);
      save(K_NOTES, notes);
    }
    openNoteEditor(target.id);
  }

  function noteLines(){ return noteDraft.content.length ? noteDraft.content.split("\n") : [""]; }
  function commitLines(lines){
    noteDraft.content = lines.join("\n");
    noteDraft.updatedAt = Date.now();
    save(K_NOTES, notes);
  }

  let undoTimer = null;
  function showUndoBanner(text, onUndo){
    let banner = document.getElementById("undoBanner");
    if(banner) banner.remove();
    if(undoTimer){ clearTimeout(undoTimer); undoTimer = null; }
    banner = document.createElement("div");
    banner.id = "undoBanner";
    banner.style.top = "auto";
    banner.style.bottom = "calc(var(--tabbar-h) + var(--safe-bottom) + 14px)";
    banner.className = "alert-banner undo-banner";
    banner.innerHTML = `<span>${text}</span><button class="undo-btn">Desfazer</button>`;
    document.body.appendChild(banner);
    banner.querySelector(".undo-btn").onclick = () => { banner.remove(); onUndo(); };
    undoTimer = setTimeout(()=>{ banner.classList.add("hide"); setTimeout(()=>{ if(banner.parentNode) banner.remove(); }, 400); }, 3000);
  }

  function toggleCheckLine(idx){
    const contentBefore = noteDraft.content;
    const lines = noteLines();
    const m = (lines[idx]||"").match(RE_CHECK);
    if(!m) return;
    const checked = (m[3]||" ").toLowerCase()==="x";
    lines[idx] = m[1] + (m[2]||"") + "[" + (checked?" ":"x") + "] " + m[4];
    // marcou (não desmarcou) + nota configurada para afundar: move para o fim do bloco de checklist
    if(!checked && noteDraft.sinkChecked){
      let end = idx;
      while(end+1 < lines.length && (lines[end+1]||"").match(RE_CHECK)) end++;
      if(end > idx){
        const [moved] = lines.splice(idx,1);
        lines.splice(end,0,moved);
      }
    }
    commitLines(lines);
    renderLiveEditor();
    const noteRef = noteDraft;
    showUndoBanner(checked ? "Item desmarcado" : "Item marcado", ()=>{
      noteRef.content = contentBefore;
      noteRef.updatedAt = Date.now();
      save(K_NOTES, notes);
      if(noteDraft === noteRef && view.screen === "noteEditor") renderLiveEditor();
    });
  }

  let editingLine = null; // índice da linha em edição

  function renderLiveEditor(focusIdx, caretEnd){
    const box = document.getElementById("liveEditor");
    if(!box) return;
    box.innerHTML = "";
    const lines = noteLines();
    const childOf = toggleChildrenMap(lines);
    const nid = noteDraft.id;

    lines.forEach((raw, i)=>{
      // esconder filhos de toggles fechados (exceto a linha em edição)
      if(childOf[i] !== undefined && isToggleCollapsed(nid, childOf[i]) && editingLine !== i) return;
      if(editingLine === i){
        const inp = document.createElement("input");
        inp.type = "text";
        inp.className = "live-line-input";
        inp.value = raw;
        inp.dataset.idx = i;
        inp.oninput = e => { const ls = noteLines(); ls[i] = e.target.value; commitLines(ls); };
        inp.onkeydown = e => {
          if(e.key === "Enter"){
            e.preventDefault();
            const ls = noteLines();
            const cur = ls[i];
            let prefix = "";
            const mc = cur.match(RE_CHECK);
            const mo = cur.match(RE_OL);
            const mu = cur.match(RE_UL);
            if(mc){
              if(mc[4].trim()===""){ ls[i] = ""; commitLines(ls); renderLiveEditor(i, true); return; } // lista vazia + Enter = sai da lista
              prefix = mc[2] ? "- [ ] " : "[ ] ";
            } else if(mo){
              if(mo[2].trim()===""){ ls[i] = ""; commitLines(ls); renderLiveEditor(i, true); return; }
              prefix = (+mo[1]+1) + ". ";
            } else if(mu){
              if(mu[1].trim()===""){ ls[i] = ""; commitLines(ls); renderLiveEditor(i, true); return; }
              prefix = "- ";
            }
            ls.splice(i+1, 0, prefix);
            commitLines(ls);
            editingLine = i+1;
            renderLiveEditor(i+1, true);
          } else if(e.key === "Backspace" && inp.selectionStart === 0 && inp.selectionEnd === 0 && i > 0){
            e.preventDefault();
            const ls = noteLines();
            const prevLen = ls[i-1].length;
            ls[i-1] = ls[i-1] + ls[i];
            ls.splice(i,1);
            commitLines(ls);
            editingLine = i-1;
            renderLiveEditor(i-1, prevLen);
          } else if(e.key === "ArrowUp" && i>0){ e.preventDefault(); editingLine = i-1; renderLiveEditor(i-1, true); }
          else if(e.key === "ArrowDown" && i<lines.length-1){ e.preventDefault(); editingLine = i+1; renderLiveEditor(i+1, true); }
          else if(e.key === "Escape"){ editingLine = null; renderLiveEditor(); }
        };
        inp.onpaste = e => {
          const text = (e.clipboardData || window.clipboardData).getData("text");
          if(text && text.indexOf("\n") >= 0){
            e.preventDefault();
            const parts = text.replace(/\r/g,"").split("\n");
            const ls = noteLines();
            const cur = ls[i];
            const selStart = inp.selectionStart, selEnd = inp.selectionEnd;
            const before = cur.slice(0, selStart), after = cur.slice(selEnd);
            const newLines = [before + parts[0], ...parts.slice(1, parts.length-1), parts[parts.length-1] + after];
            ls.splice(i, 1, ...newLines);
            commitLines(ls);
            editingLine = i + newLines.length - 1;
            renderLiveEditor(editingLine, parts[parts.length-1].length);
          }
        };
        inp.onblur = () => {
          // pequena espera: se o próximo foco também é do editor, não fecha
          setTimeout(()=>{
            const ae = document.activeElement;
            if(!ae || !ae.classList || !ae.classList.contains("live-line-input")){
              if(editingLine === i){ editingLine = null; renderLiveEditor(); }
            }
          }, 120);
        };
        box.appendChild(inp);
        return;
      }

      const div = document.createElement("div");
      div.className = "live-line";
      div.dataset.idx = i;
      let m;
      if(raw.trim() === ""){
        div.classList.add("empty");
        div.innerHTML = "&nbsp;";
      } else if(raw.trim().match(RE_HR)){
        div.innerHTML = `<div style="border-top:1px solid var(--border, rgba(128,128,128,.35)); margin:8px 0;"></div>`;
      } else if((m = raw.trim().match(RE_TOGGLE))){
        const collapsed = isToggleCollapsed(nid, i);
        div.classList.add("li-line");
        div.innerHTML = `<span class="li-marker" data-toggle="${i}" style="cursor:pointer; user-select:none;">${collapsed?'&#9656;':'&#9662;'}</span> <strong>${mdInline(escapeHtml(m[1]))}</strong>`;
      } else if((m = raw.trim().match(RE_CHECK))){
        const checked = (m[3]||" ").toLowerCase()==="x";
        div.className = "checklist-item live-line" + (checked?" checked":"");
        div.dataset.idx = i;
        div.innerHTML = `<span class="checklist-box" data-check="${i}">${checked?'&#10003;':''}</span><span class="txt">${mdInline(escapeHtml(m[4]))}</span>`;
      } else if((m = raw.trim().match(RE_HEAD))){
        const lv = m[1].length;
        div.innerHTML = `<h${lv} class="inline-h">${mdInline(escapeHtml(m[2]))}</h${lv}>`;
      } else if((m = raw.trim().match(RE_OL))){
        div.innerHTML = `<span class="li-marker">${m[1]}.</span> ${mdInline(escapeHtml(m[2]))}`;
        div.classList.add("li-line");
      } else if((m = raw.trim().match(RE_UL))){
        div.innerHTML = `<span class="li-marker">&bull;</span> ${mdInline(escapeHtml(m[1]))}`;
        div.classList.add("li-line");
      } else {
        div.innerHTML = mdInline(escapeHtml(raw));
      }

      div.onclick = e => {
        if(e.target.dataset && e.target.dataset.toggle !== undefined){
          flipToggle(nid, +e.target.dataset.toggle);
          renderLiveEditor();
          return;
        }
        if(e.target.dataset && e.target.dataset.check !== undefined){
          toggleCheckLine(+e.target.dataset.check);
          return;
        }
        if(e.target.dataset && e.target.dataset.wikilink){
          openNoteByTitle(e.target.dataset.wikilink);
          return;
        }
        editingLine = i;
        renderLiveEditor(i, true);
      };
      box.appendChild(div);
    });

    // área de toque no final para adicionar linha
    const tail = document.createElement("div");
    tail.className = "live-tail";
    tail.onclick = () => {
      const ls = noteLines();
      if(ls[ls.length-1].trim() !== "") ls.push("");
      commitLines(ls);
      editingLine = ls.length-1;
      renderLiveEditor(ls.length-1, true);
    };
    box.appendChild(tail);

    if(focusIdx !== undefined && editingLine === focusIdx){
      const inp = box.querySelector(`input[data-idx='${focusIdx}']`);
      if(inp){
        inp.focus();
        const pos = caretEnd === true ? inp.value.length : (typeof caretEnd === "number" ? caretEnd : inp.value.length);
        try{ inp.setSelectionRange(pos, pos); }catch(e){}
      }
    }
  }

  function slugify(s){
    return (s||"nota").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z0-9]+/g,"-").replace(/^-+|-+$/g,"").toLowerCase() || "nota";
  }
  function downloadFile(filename, text, mime){
    const blob = new Blob([text], { type: mime || "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
  }
  function exportNoteMd(){
    const title = noteDraft.title.trim() || "nota";
    const md = "# " + title + "\n\n" + noteDraft.content + "\n";
    downloadFile(slugify(title) + ".md", md, "text/markdown;charset=utf-8");
    showAlertBanner("Nota exportada para Downloads ✓");
  }
  async function shareOrDownload(filename, text, mime){
    try{
      if(navigator.canShare && navigator.share){
        const file = new File([text], filename, { type: mime });
        if(navigator.canShare({ files: [file] })){
          await navigator.share({ files: [file], title: filename });
          return true;
        }
      }
    }catch(e){ if(e && e.name === "AbortError") return true; }
    downloadFile(filename, text, mime);
    return false;
  }

  function exportBackup(){
    const data = { version: 4, exportedAt: new Date().toISOString(), routines, notes, history, templates, snoozes, tarefas, tarefasHist };
    shareOrDownload("rotinas-backup-" + localKey() + ".json", JSON.stringify(data, null, 2), "application/json");
    save(K_LASTBACKUP, Date.now());
    showAlertBanner("Backup exportado ✓");
  }
  function importBackup(file){
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const data = JSON.parse(reader.result);
        if(data.type === "rotina-share" && data.routine){
          const r = data.routine;
          r.id = uid();
          r.steps.forEach(s=>{ s.id = uid(); if(s.type==="routine") s.type = "checklist"; s.noteId = undefined; });
          if(!r.schedule) r.schedule = { enabled:false, anchor:"start", time:"07:00", days:[0,1,2,3,4,5,6] };
          r.schedule.enabled = false;
          if(routines.some(x=>x.name===r.name)) r.name += " (importada)";
          routines.push(r);
          save(K_ROUTINES, routines);
          showAlertBanner("Rotina \"" + r.name + "\" importada ✓");
          render();
          return;
        }
        // backup completo: confirmar substituir ou mesclar

    };
    reader.readAsText(file);
  }

  /* ---- Avisos: armazenamento e backup ---- */
  let warnedStorage = false, dismissedBackupNotice = false;
  function storageBytes(){
    let total = 0;
    try{ for(let i=0;i<localStorage.length;i++){ const k = localStorage.key(i); total += ((localStorage.getItem(k)||"").length + k.length) * 2; } }catch(e){}
    return total;
  }
  function checkStorageWarning(){
    if(warnedStorage) return;
    const mb = storageBytes()/1048576;
    if(mb > 3.5){
      warnedStorage = true;
      showAlertBanner("Armazenamento quase cheio (" + mb.toFixed(1).replace(".",",") + " MB de ~5 MB). Exporte um backup e considere apagar notas antigas.");
    }
  }
  function agendaSnoozed(){
    const now = Date.now();
    return snoozes.some(s=>now >= s.from && now <= s.to);
  }
  function snoozedOn(dateObj){
    const t = dateObj.getTime();
    return snoozes.some(s=>t >= s.from && t <= s.to);
  }
  function backupOverdue(){
    if(dismissedBackupNotice) return false;
    if(routines.length === 0 && notes.length === 0) return false;
    const last = load(K_LASTBACKUP, null);
    return !last || (Date.now() - last) > 30*86400000;
  }

  /* ================= PLAYER ================= */
  function expandSteps(r, visited){
    visited = visited || new Set();
    if(visited.has(r.id)) return [];
    visited.add(r.id);
    let out = [];
    r.steps.forEach(s=>{
      if(s.type==="routine"){
        const ref = routines.find(x=>x.id===s.refId);
        if(ref) out = out.concat(expandSteps(ref, visited));
      } else {
        out.push(Object.assign({}, s));
      }
    });
    return out;
  }
  function applyCycle(base, cycle){
    if(!cycle || !cycle.enabled || cycle.times < 2) return base;
    const from = Math.max(1, cycle.from) - 1;
    const to = Math.min(base.length, cycle.to) - 1;
    if(from > to || from >= base.length) return base;
    const block = base.slice(from, to+1);
    const out = base.slice(0, from);
    for(let k=1; k<=cycle.times; k++){
      block.forEach(s=>{
        const c = Object.assign({}, s);
        c.id = s.id + "-c" + k;
        if(cycle.times > 1) c.name = s.name + " · volta " + k + "/" + cycle.times;
        out.push(c);
      });
    }
    return out.concat(base.slice(to+1));
  }
  function playbackSteps(r){
    let base = expandSteps(r);
    base = applyCycle(base, r.cycle);
    const rest = r.restSeconds || 0;
    if(!rest || base.length < 2) return base;
    const out = [];
    base.forEach((s,i)=>{
      out.push(s);
      if(i < base.length-1) out.push({ id:"rest-"+i, name:"Descanso", type:"timer", seconds:rest, advance:"auto", isRest:true });
    });
    return out;
  }
  function currentStep(){ return playerState.steps[playerState.idx]; }

  /* ---- Wake Lock ---- */
  let wakeLock = null;
  async function acquireWakeLock(){
    try{ if("wakeLock" in navigator){ wakeLock = await navigator.wakeLock.request("screen"); } }catch(e){ wakeLock = null; }
  }
  function releaseWakeLock(){
    if(wakeLock){ try{ wakeLock.release(); }catch(e){} wakeLock = null; }
  }

  /* ---- Persistência do estado de execução ---- */
  let lastSnapTs = 0;
  function savePlayerSnapshot(force){
    if(!playerState) return;
    const now = Date.now();
    if(!force && now - lastSnapTs < 5000) return;
    lastSnapTs = now;
    const p = playerState;
    save(K_PLAYER, {
      routineId:p.routine.id, steps:p.steps, idx:p.idx,
      stepEndTs:p.stepEndTs, stepStart:p.stepStart,
      paused:p.paused, pausedAt:p.pausedAt, pauseCount:p.pauseCount, pausedTotalMs:p.pausedTotalMs,
      startedAt:p.startedAt, schedStartMin:p.schedStartMin, actualStartMin:p.actualStartMin,
      stepActuals:p.stepActuals, overtimeCueFired:p.overtimeCueFired
    });
  }
  function clearPlayerSnapshot(){ try{ localStorage.removeItem(K_PLAYER); }catch(e){} }
  function getPlayerSnapshot(){ return load(K_PLAYER, null); }

  function computeRemaining(){
    const step = currentStep();
    if(step.type !== "timer" || !playerState.stepEndTs) return 0;
    const ref = (playerState.paused && playerState.pausedAt) ? playerState.pausedAt : Date.now();
    return Math.round((playerState.stepEndTs - ref)/1000);
  }

  function startPlayer(id){
    const r = routines.find(x=>x.id===id);
    if(!r) return;
    const steps = playbackSteps(r);
    if(steps.length === 0) return;
    const now = new Date();
    let schedStartMin = null;
    const sched = computeSchedule(r);
    if(sched && (!r.schedule.days || r.schedule.days.includes(now.getDay()))) schedStartMin = sched.startMin;
    const first = steps[0];
    playerState = {
      routine: r, steps, idx: 0,
      paused:false, pausedAt:null, pauseCount:0, pausedTotalMs:0,
      overtimeCueFired:false, zen:false,
      stepStart: Date.now(),
      stepEndTs: first.type==="timer" ? Date.now() + first.seconds*1000 : null,
      stepActuals: [], startedAt: Date.now(),
      schedStartMin, actualStartMin: now.getHours()*60 + now.getMinutes()
    };
    view = { tab:"home", screen:"player" };
    render();
    acquireWakeLock();
    savePlayerSnapshot(true);
    if(first.type==="timer") startTicking();
  }

  function resumePlayer(){
    const snap = getPlayerSnapshot();
    if(!snap) return;
    const r = routines.find(x=>x.id===snap.routineId);
    if(!r){ clearPlayerSnapshot(); render(); return; }
    playerState = Object.assign({ zen:false }, snap, { routine:r });
    view = { tab:"home", screen:"player" };
    catchUpSteps();
    if(view.screen !== "player") return; // terminou durante o catch-up
    render();
    acquireWakeLock();
    if(currentStep().type==="timer" && !playerState.paused) startTicking();
  }

  function clearTicking(){ if(timerHandle){ clearInterval(timerHandle); timerHandle=null; } }

  function startTicking(){
    clearTicking();
    timerHandle = setInterval(()=>{
      if(playerState.paused) return;
      const step = currentStep();
      if(step.type !== "timer") return;
      const rem = computeRemaining();
      const manual = step.advance === "manual" && !step.isRest;
      if(rem <= 0 && !manual){ advanceStep(false); return; }
      if(rem <= 0 && manual && !playerState.overtimeCueFired){ timeUpCue(); playerState.overtimeCueFired = true; }
      updateTicker();
      savePlayerSnapshot();
    }, 1000);
  }

  /* Consome etapas que expiraram enquanto o app estava fechado/oculto */
  function catchUpSteps(){
    let guard = 0;
    while(guard++ < 100){
      const step = currentStep();
      if(step.type !== "timer" || playerState.paused) return;
      const manual = step.advance === "manual" && !step.isRest;
      const rem = Math.round((playerState.stepEndTs - Date.now())/1000);
      if(rem > 0 || manual) return;
      playerState.stepActuals[playerState.idx] = {
        name: step.name, isRest: !!step.isRest, planned: step.seconds,
        actual: Math.round((playerState.stepEndTs - playerState.stepStart)/1000), skipped:false
      };
      if(playerState.idx >= playerState.steps.length - 1){
        clearTicking(); finishCue(); finishRoutine(); return;
      }
      playerState.idx += 1;
      playerState.overtimeCueFired = false;
      const ns = currentStep();
      playerState.stepStart = playerState.stepEndTs;
      playerState.stepEndTs = ns.type==="timer" ? playerState.stepStart + ns.seconds*1000 : null;
      if(ns.type !== "timer"){ clearTicking(); savePlayerSnapshot(true); return; }
    }
  }

  function togglePause(){
    if(!playerState.paused){
      playerState.paused = true;
      playerState.pausedAt = Date.now();
      playerState.pauseCount += 1;
    } else {
      const delta = Date.now() - playerState.pausedAt;
      playerState.pausedTotalMs += delta;
      if(playerState.stepEndTs) playerState.stepEndTs += delta;
      playerState.stepStart += delta;
      playerState.paused = false;
      playerState.pausedAt = null;
    }
    savePlayerSnapshot(true);
    render();
  }

  function endPauseIfAny(){
    if(playerState.paused && playerState.pausedAt){
      const delta = Date.now() - playerState.pausedAt;
      playerState.pausedTotalMs += delta;
      playerState.paused = false;
      playerState.pausedAt = null;
    }
  }

  function recordStepActual(skipped){
    const step = currentStep();
    const endRef = (playerState.paused && playerState.pausedAt) ? playerState.pausedAt : Date.now();
    const elapsed = Math.round((endRef - playerState.stepStart)/1000);
    playerState.stepActuals[playerState.idx] = {
      name: step.name, isRest: !!step.isRest,
      planned: step.type==="timer" ? step.seconds : null,
      actual: skipped ? 0 : elapsed,
      skipped: !!skipped
    };
  }

  function advanceStep(skipped){
    recordStepActual(skipped);
    endPauseIfAny();
    if(playerState.idx >= playerState.steps.length - 1){
      clearTicking(); finishCue(); finishRoutine(); return;
    }
    stepTransitionCue();
    playerState.idx += 1;
    playerState.overtimeCueFired = false;
    playerState.stepStart = Date.now();
    const step = currentStep();
    playerState.stepEndTs = step.type==="timer" ? Date.now() + step.seconds*1000 : null;
    render();
    savePlayerSnapshot(true);
    if(step.type==="timer") startTicking(); else clearTicking();
  }

  function goPrevStep(){
    if(playerState.idx<=0) return;
    endPauseIfAny();
    playerState.idx -= 1;
    playerState.overtimeCueFired = false;
    playerState.stepStart = Date.now();
    playerState.stepActuals[playerState.idx] = undefined;
    const s = currentStep();
    playerState.stepEndTs = s.type==="timer" ? Date.now() + s.seconds*1000 : null;
    render();
    savePlayerSnapshot(true);
    if(s.type==="timer") startTicking(); else clearTicking();
  }

  function finishRoutine(){
    releaseWakeLock();
    clearPlayerSnapshot();
    const now = new Date();
    const stepsDone = playerState.stepActuals.filter(Boolean);
    const skippedPlanned = stepsDone.filter(a=>a.skipped && a.planned).reduce((s,a)=>s+a.planned,0);
    const totalPlanned = playerState.steps.reduce((a,s)=> a + (s.type==="timer"?s.seconds:0), 0);
    const plannedSec = totalPlanned - skippedPlanned;
    const grossSec = Math.round((Date.now() - playerState.startedAt)/1000);
    const actualSec = Math.max(0, grossSec - Math.round(playerState.pausedTotalMs/1000));
    const entry = {
      date: localKey(now),
      ts: Date.now(),
      routineId: playerState.routine.id,
      routineName: playerState.routine.name,
      plannedSec, actualSec,
      pauses: playerState.pauseCount,
      pausedSec: Math.round(playerState.pausedTotalMs/1000),
      skippedCount: stepsDone.filter(a=>a.skipped).length,
      steps: stepsDone
    };
    if(playerState.schedStartMin !== null && playerState.schedStartMin !== undefined){
      let delay = playerState.actualStartMin - playerState.schedStartMin;
      if(delay > 720) delay -= 1440; if(delay < -720) delay += 1440;
      entry.schedDelayMin = delay;
    }
    history.push(entry);
    save(K_HISTORY, history);
    view = { tab:"home", screen:"done" };
    render();
  }

  function updateTicker(){
    const step = currentStep();
    const rem = computeRemaining();
    const timeEls = document.querySelectorAll(".dial-time .t, .zen-time");
    const dialWrap = document.querySelector(".dial-wrap");
    const arc = document.getElementById("dialArc");
    timeEls.forEach(t=>{
      t.textContent = fmtTime(rem);
      t.classList.toggle("overtime", rem < 0);
    });
    if(dialWrap) dialWrap.classList.toggle("overtime", rem < 0);
    if(arc && step.type==="timer"){
      const frac = Math.max(rem,0) / step.seconds;
      const circumference = 2*Math.PI*116;
      arc.style.strokeDashoffset = circumference * frac;
    }
    const segs = document.querySelectorAll(".stepper-track .seg");
    if(segs[playerState.idx] && step.type==="timer"){
      const fill = segs[playerState.idx].querySelector(".fill");
      if(fill){ const doneFrac = 1 - (Math.max(rem,0) / step.seconds); fill.style.width = (doneFrac*100)+"%"; }
    }
    const nextBtn = document.getElementById("nextStep");
    if(nextBtn) nextBtn.classList.toggle("pulse", rem < 0);
    updateEstimate();
  }

  function updateEstimate(){
    const el = document.getElementById("estimateTime");
    if(!el) return;
    const step = currentStep();
    let currentRemaining = step.type==="timer" ? Math.max(computeRemaining(),0) : 0;
    let future = 0;
    for(let i=playerState.idx+1;i<playerState.steps.length;i++){ if(playerState.steps[i].type==="timer") future += playerState.steps[i].seconds; }
    const finish = new Date(Date.now() + (currentRemaining+future)*1000);
    el.textContent = fmtClock(finish);
  }


  /* ---- Overlay de nota vinculada à etapa ---- */
  function toggleCheckLineIn(note, idx){
    const lines = note.content.length ? note.content.split("\n") : [""];
    const m = (lines[idx]||"").match(RE_CHECK);
    if(!m) return;
    const checked = (m[3]||" ").toLowerCase()==="x";
    lines[idx] = m[1] + (m[2]||"") + "[" + (checked?" ":"x") + "] " + m[4];
    note.content = lines.join("\n");
    note.updatedAt = Date.now();
    save(K_NOTES, notes);
  }
  function renderNoteReadonly(note){
    const lines = note.content.length ? note.content.split("\n") : [];
    const childOf = toggleChildrenMap(lines);
    let out = "";
    lines.forEach((raw,i)=>{
      if(childOf[i] !== undefined && isToggleCollapsed(note.id, childOf[i])) return;
      const t = raw.trim();
      let m;
      if(t === ""){ out += '<div class="live-line empty">&nbsp;</div>'; return; }
      if(t.match(RE_HR)){ out += '<div style="border-top:1px solid var(--border, rgba(128,128,128,.35)); margin:8px 0;"></div>'; return; }
      if((m = t.match(RE_TOGGLE))){
        const collapsed = isToggleCollapsed(note.id, i);
        out += `<div class="live-line li-line"><span class="li-marker" data-ovtoggle="${i}" style="cursor:pointer; user-select:none;">${collapsed?'&#9656;':'&#9662;'}</span> <strong>${mdInline(escapeHtml(m[1]))}</strong></div>`;
        return;
      }
      if((m = t.match(RE_CHECK))){
        const checked = (m[3]||" ").toLowerCase()==="x";
        out += `<div class="checklist-item ${checked?'checked':''}"><span class="checklist-box" data-ovcheck="${i}">${checked?'&#10003;':''}</span><span class="txt">${mdInline(escapeHtml(m[4]))}</span></div>`;
        return;
      }
      if((m = t.match(RE_HEAD))){ const lv=m[1].length; out += `<h${lv} class="inline-h">${mdInline(escapeHtml(m[2]))}</h${lv}>`; return; }
      if((m = t.match(RE_OL))){ out += `<div class="live-line li-line"><span class="li-marker">${m[1]}.</span> ${mdInline(escapeHtml(m[2]))}</div>`; return; }
      if((m = t.match(RE_UL))){ out += `<div class="live-line li-line"><span class="li-marker">&bull;</span> ${mdInline(escapeHtml(m[1]))}</div>`; return; }
      out += `<div class="live-line">${mdInline(escapeHtml(raw))}</div>`;
    });
    return out || '<p style="color:var(--muted)">Nota vazia.</p>';
  }
  function openNoteOverlay(noteId){
    const note = notes.find(n=>n.id===noteId);
    if(!note){ showAlertBanner("A nota vinculada foi excluída"); return; }
    let ov = document.getElementById("noteOverlay");
    if(ov) ov.remove();
    ov = document.createElement("div");
    ov.id = "noteOverlay";
    ov.className = "note-overlay";
    function paint(){
      ov.innerHTML = `
        <div class="note-overlay-box">
          <div class="note-overlay-top">
            <h3>${escapeHtml(note.title||"Sem título")}</h3>
            <button class="icon-btn" id="closeOverlay">&#10005;</button>
          </div>
          <div class="note-overlay-body">${renderNoteReadonly(note)}</div>
        </div>`;

      });

        sp.onclick = () => { flipToggle(note.id, +sp.dataset.ovtoggle); paint(); };
      });
    }
    paint();
    document.body.appendChild(ov);
  }
  function renderPlayer(){
    const el = document.createElement("div");
    el.className = "screen"; el.style.paddingBottom = "0";
    const steps = playerState.steps;
    const step = currentStep();
    const rem = computeRemaining();
    const rColor = playerState.routine.color;

    /* ---- MODO ZEN ---- */
    if(playerState.zen){
      el.className = "screen zen-screen";
      const isTimer = step.type === "timer";
      el.innerHTML = `
        <div class="zen-wrap">
          <div class="zen-label">${escapeHtml(step.name)}</div>
          ${isTimer
            ? `<div class="zen-time ${rem<0?'overtime':''}">${fmtTime(rem)}</div>`
            : `<div class="check-circle" style="width:140px;height:140px;font-size:56px;">&#10003;</div>`}
          <div class="zen-sub">término ~ <b id="estimateTime">--:--</b> &nbsp;·&nbsp; ${playerState.idx+1}/${steps.length}</div>
          <div class="player-controls" style="margin-top:26px;">
            <button class="ctrl-btn" id="zenPrev">&#8634;</button>
            ${isTimer
              ? `<button class="ctrl-btn big" id="pauseBtn">${playerState.paused?"&#9654;":"&#10074;&#10074;"}</button>`
              : `<button class="ctrl-btn big" id="nextStep">&#10003;</button>`}
            ${isTimer ? `<button class="ctrl-btn ${rem<0?'pulse':''}" id="nextStep">&#8635;</button>` : `<div style="width:56px"></div>`}
          </div>
          <div style="display:flex; gap:10px; margin-top:14px;">
            ${step.optional && !step.isRest ? `<button class="skip-btn" id="skipStep">pular</button>` : ""}
            ${step.noteId && notes.some(n=>n.id===step.noteId) ? `<button class="skip-btn note-link-btn" id="viewStepNote">&#128279; nota</button>` : ""}
            <button class="skip-btn" id="zenExit">&#8996; sair do zen</button>
          </div>
        </div>
      `;
      app.appendChild(el);
      updateEstimate();
      document.getElementById("zenExit").onclick = () => { playerState.zen = false; render(); };
      document.getElementById("zenPrev").onclick = goPrevStep;
      const pb = document.getElementById("pauseBtn"); if(pb) pb.onclick = togglePause;
      document.getElementById("nextStep").onclick = () => advanceStep(false);
      const sk = document.getElementById("skipStep"); if(sk) sk.onclick = () => advanceStep(true);
      const nb = document.getElementById("viewStepNote"); if(nb) nb.onclick = () => openNoteOverlay(step.noteId);
      return;
    }

    const wrap = document.createElement("div");
    wrap.className = "player";

    const top = document.createElement("div");
    top.className = "player-top";
    top.innerHTML = `
      <button class="player-close" id="exitPlayer">Sair</button>
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="player-close" id="zenBtn" title="Modo tela cheia">&#9974;</button>
        <div class="player-progress-label">${playerState.idx+1} / ${steps.length}</div>
      </div>
    `;
    wrap.appendChild(top);

    const track = document.createElement("div");
    track.className = "stepper-track";
    steps.forEach((s,i)=>{
      const seg = document.createElement("div");
      seg.className = "seg" + (i<playerState.idx ? " done" : "") + (s.isRest ? " rest" : "");
      const fillPct = i<playerState.idx ? 100 : (i===playerState.idx && s.type==="timer" ? (1-Math.max(rem,0)/s.seconds)*100 : 0);
      seg.innerHTML = `<div class="fill" style="width:${fillPct}%"></div>`;
      track.appendChild(seg);
    });
    wrap.appendChild(track);

    const estRow = document.createElement("div");
    estRow.className = "estimate-row";
    estRow.innerHTML = `<span>previsão de término</span><b id="estimateTime">--:--</b>`;
    wrap.appendChild(estRow);

    if(step.type === "timer"){
      const dial = document.createElement("div");
      dial.className = "dial-wrap" + (rem<0 ? " overtime" : "") + (step.isRest ? " restdial" : "");
      const rad=116, c=2*Math.PI*rad;
      const frac = Math.max(rem,0)/step.seconds;
      const useGrad = !rColor || rColor === "grad";
      const strokeColor = step.isRest ? "#6B8F71" : (useGrad ? "url(#dialGrad)" : rColor);
      dial.innerHTML = `
        <svg viewBox="0 0 260 260">
          <defs>
            <linearGradient id="dialGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#EC6AA8"/>
              <stop offset="100%" stop-color="#5B8DEF"/>
            </linearGradient>
          </defs>
          <circle class="dial-track" cx="130" cy="130" r="${rad}" fill="none" stroke-width="10"/>
          <circle id="dialArc" cx="130" cy="130" r="${rad}" fill="none" stroke="${strokeColor}" stroke-width="10" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c*frac}"/>
        </svg>
        <div class="dial-time">
          <div class="step-title">${step.isRest ? "Descanso" : "Etapa "+(playerState.idx+1)}</div>
          <div class="t ${rem<0?'overtime':''}">${fmtTime(rem)}</div>
          <div class="label">${escapeHtml(step.name)}</div>
        </div>
      `;
      wrap.appendChild(dial);

      const controls = document.createElement("div");
      controls.className = "player-controls";
      controls.innerHTML = `
        <button class="ctrl-btn" id="prevStep">&#8634;</button>
        <button class="ctrl-btn big" id="pauseBtn">${playerState.paused?"&#9654;":"&#10074;&#10074;"}</button>
        <button class="ctrl-btn ${rem<0?'pulse':''}" id="nextStep">&#8635;</button>
      `;
      wrap.appendChild(controls);
    } else {
      const body = document.createElement("div");
      body.className = "checklist-body";
      body.innerHTML = `<div class="step-title">Etapa ${playerState.idx+1}</div><div class="check-circle">&#10003;</div><h2>${escapeHtml(step.name)}</h2>`;
      wrap.appendChild(body);

      const controls = document.createElement("div");
      controls.className = "player-controls";
      controls.innerHTML = `<button class="ctrl-btn" id="prevStep">&#8634;</button><button class="ctrl-btn big" id="nextStep">&#10003;</button><div style="width:56px"></div>`;
      wrap.appendChild(controls);
    }

    if(step.optional && !step.isRest){
      const skipRow = document.createElement("div");
      skipRow.style.cssText = "width:100%; text-align:center; padding:10px 0 4px;";
      skipRow.innerHTML = `<button class="skip-btn" id="skipStep">pular etapa (opcional)</button>`;
      wrap.appendChild(skipRow);
    }

    if(step.noteId && notes.some(n=>n.id===step.noteId)){
      const noteRow = document.createElement("div");
      noteRow.style.cssText = "width:100%; text-align:center; padding:6px 0 2px;";
      noteRow.innerHTML = `<button class="skip-btn note-link-btn" id="viewStepNote">&#128279; ver nota vinculada</button>`;
      wrap.appendChild(noteRow);
    }

    el.appendChild(wrap);
    app.appendChild(el);
    updateEstimate();

    document.getElementById("exitPlayer").onclick = () => {
      confirmModal("Sair da rotina em andamento?<br><small>O progresso fica salvo para retomar depois.</small>", "Sair", ()=>{
        clearTicking(); releaseWakeLock(); savePlayerSnapshot(true);
        view={tab:"home",screen:"home"}; render();
      });
    };
    const zenBtn = document.getElementById("zenBtn"); if(zenBtn) zenBtn.onclick = () => { playerState.zen = true; render(); };
    const prevBtn = document.getElementById("prevStep"); if(prevBtn) prevBtn.onclick = goPrevStep;
    const pauseBtn = document.getElementById("pauseBtn"); if(pauseBtn) pauseBtn.onclick = togglePause;
    const nextBtn = document.getElementById("nextStep"); if(nextBtn) nextBtn.onclick = () => advanceStep(false);
    const skipBtn = document.getElementById("skipStep"); if(skipBtn) skipBtn.onclick = () => advanceStep(true);
    const noteBtn = document.getElementById("viewStepNote"); if(noteBtn) noteBtn.onclick = () => openNoteOverlay(step.noteId);
  }

  function renderDone(){
    const el = document.createElement("div");
    el.className = "screen";
    const streak = computeStreak();
    const last = history[history.length-1];
    let detail = "";
    if(last && last.plannedSec){
      const diff = last.actualSec - last.plannedSec;
      const sign = diff >= 0 ? "+" : "&minus;";
      detail = `<p>Planejado ${fmtTime(last.plannedSec)} · real ${fmtTime(last.actualSec)} (${sign}${fmtTime(Math.abs(diff))})</p>`;
      if(last.pauses > 0) detail += `<p>${last.pauses} pausa(s) · ${fmtTime(last.pausedSec).replace("+","")} pausado</p>`;
      if(last.skippedCount > 0) detail += `<p>${last.skippedCount} etapa(s) pulada(s)</p>`;
    }
    const MOODS = ["&#128534;","&#128533;","&#128528;","&#128578;","&#128516;"];
    el.innerHTML = `
      <div class="done-screen">
        <div class="mark">&#10003;</div>
        <h2>Rotina concluída</h2>
        <p>${streak} dia${streak>1?'s':''} seguido${streak>1?'s':''} de prática.</p>
        ${detail}
        <div class="mood-row">
          ${MOODS.map((m,i)=>`<button class="mood-btn ${last && last.mood===i+1?'sel':''}" data-mood="${i+1}">${m}</button>`).join("")}
        </div>
        <p class="dev-n" style="margin-top:2px;">como foi?</p>
      </div>
      <div style="padding-bottom:8px;"><button class="btn-primary" id="backHome">Voltar</button></div>
    `;
    app.appendChild(el);
    el.querySelectorAll("[data-mood]").forEach(b=>{
      b.onclick = () => {
        if(last){ last.mood = +b.dataset.mood; save(K_HISTORY, history); }
        el.querySelectorAll("[data-mood]").forEach(x=>x.classList.remove("sel"));
        b.classList.add("sel");
      };
    });
    document.getElementById("backHome").onclick = () => { view={tab:"home",screen:"home"}; render(); };
  }

  /* ---------------- INIT ---------------- */
  applyTheme();
  render();
  startScheduler();

  (function handleStartParam(){
    const params = new URLSearchParams(window.location.search);
    const startId = params.get("start");
    if(startId && routines.find(r=>r.id===startId)){
      startPlayer(startId);
      history_replaceUrl();
      return;
    }
    if(params.get("new") === "note"){
      view = { tab:"notes", screen:"notes" };
      openNoteEditor(null);
      history_replaceUrl();
      return;
    }
    if(params.get("quick") === "start"){
      history_replaceUrl();
      if(getPlayerSnapshot()){ resumePlayer(); return; }
      if(routines.length === 1){ startPlayer(routines[0].id); return; }
      // várias rotinas: fica na home para o usuário escolher
    }
  })();
  function history_replaceUrl(){
    try{ window.history.replaceState({}, "", window.location.pathname); }catch(e){}
  }

  document.addEventListener("visibilitychange", () => {
    if(document.hidden) return;
    if(view.screen === "player" && playerState){
      catchUpSteps();
      if(view.screen === "player"){ render(); acquireWakeLock(); if(currentStep().type==="timer" && !playerState.paused) startTicking(); }
    }
    if(view.screen === "templateDoc"){
      const doc = templates.find(t=>t.id===view.id);
      if(doc && doc.type === "countdown") render(); // recalcular dias após virada de dia
    }
    checkSchedules();
  });

})();
</script>
</body>
</html>
