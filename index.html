        <div class="header-right">
          <button class="bell-btn" id="statsBackupBtn" title="Exportar backup completo">&#8681;</button>
          <button class="bell-btn" id="statsImportBtn" title="Importar backup">&#8679;</button>
          <input type="file" id="statsImportFile" accept="application/json" style="display:none">
          <button class="bell-btn" id="csvBtn" title="Exportar CSV" style="width:auto; padding:0 10px; font-size:12px; font-family:'IBM Plex Mono',monospace;">CSV</button>
        </div>
      </div>
      <div class="stats-nav">
        <div class="type-toggle view-toggle">
          <span data-sview="resumo" class="${statsView==='resumo'?'active':''}">resumo</span>
          <span data-sview="mensal" class="${statsView==='mensal'?'active':''}">mensal</span>
          <span data-sview="anual" class="${statsView==='anual'?'active':''}">anual</span>
        </div>
      </div>
      ${statsView==='resumo' ? `
      <div class="stats-nav">
        <div class="type-toggle period-toggle">
          ${["7d","30d","90d","ano","tudo"].map(p=>`<span data-period="${p}" class="${statsPeriod===p?'active':''}">${p}</span>`).join("")}
        </div>
      </div>` : ""}
    `;

    const body = document.createElement("div");
    body.style.cssText = "overflow-y:auto; flex:1;";
    el.appendChild(body);
    el.appendChild(renderTabbar("stats"));
    app.appendChild(el);

    document.getElementById("csvBtn").onclick = exportStatsCsv;
    document.getElementById("statsBackupBtn").onclick = exportBackup;
    const statsImpFile = document.getElementById("statsImportFile");
    document.getElementById("statsImportBtn").onclick = () => statsImpFile.click();
    statsImpFile.onchange = e => { if(e.target.files && e.target.files[0]){ importBackup(e.target.files[0]); e.target.value=""; } };
    el.querySelectorAll("[data-sview]").forEach(sp=> sp.onclick = () => { statsView = sp.dataset.sview; selectedDay = null; render(); });
    el.querySelectorAll("[data-period]").forEach(sp=> sp.onclick = () => { statsPeriod = sp.dataset.period; render(); });

    if(history.length === 0 && tarefasHist.length === 0){
      body.innerHTML = `<div class="empty-state" style="min-height:50vh;"><h2>Sem dados ainda</h2><p>Conclua rotinas para ver seu histórico, desvios de tempo e pontualidade aqui.</p></div>`;
      return;
    }

    if(statsView === "mensal"){ renderMonthView(body); return; }
    if(statsView === "anual"){ renderYearView(body); return; }
    renderTarefasResumo(body);
    if(history.length) renderResumo(body);
  }

  /* ============ RESUMO DAS TAREFAS (fila 🍱) ============ */
  function renderTarefasResumo(body){
    if(tarefasHist.length === 0) return;
    const now = Date.now();
    const d7 = now - 7*86400000, d30 = now - 30*86400000;
    const last7 = tarefasHist.filter(h=>h.ts>=d7);
    const last30 = tarefasHist.filter(h=>h.ts>=d30);
    const min7 = last7.reduce((a,h)=>a+(h.dur||0),0);
    let rows = "";
    EIXOS.forEach(ex=>{
      const n7 = last7.filter(h=>h.eixo===ex.id).length;
      const n30 = last30.filter(h=>h.eixo===ex.id).length;
      if(n30===0) return;
      const pct = last7.length ? Math.round(n7/Math.max(1,last7.length)*100) : 0;
      rows += `<div class="bar-row"><div class="bar-name" style="color:${ex.color};">${ex.label}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(3,pct)}%; background:${ex.color};"></div></div><div class="bar-val">${n7} / 7d · ${n30} / 30d</div></div>`;
    });
    body.innerHTML += `<div class="section-label">Tarefas &#127857;</div>
      <div class="stat-card">${rows || '<div class="dev-n">sem conclusões nos últimos 30 dias</div>'}
      <div class="stat-foot">${last7.length} tarefa(s) e ${min7} min na última semana · ${tarefasHist.length} no total</div></div>`;
  }

  /* ============ VISÃO RESUMO ============ */
  function renderResumo(body){
    const rich = richInPeriod();
    const allRich = history.filter(h=>h.ts);
    const byDate = minutesByDate(history);

    /* --- heatmap 17 semanas, alinhado por dia da semana --- */
    const to = new Date(); to.setHours(12,0,0,0);
    const from = new Date(to); from.setDate(from.getDate() - 7*17 + 1);
    body.innerHTML += `<div class="section-label">Últimas 17 semanas · toque num dia</div><div class="stat-card" id="hmCard">${heatmapHtml(from, to, byDate)}
      <div class="stat-foot">${computeStreak()} dia(s) seguidos · ${Object.keys(byDate).length} dias ativos no total</div></div>`;
    if(selectedDay) body.innerHTML += dayDetailHtml(selectedDay);

    /* --- metas: semana-calendário (seg–dom) com pró-rata --- */
    const weekStart = new Date(); weekStart.setHours(0,0,0,0);
    weekStart.setDate(weekStart.getDate() - ((weekStart.getDay()+6)%7)); // segunda
    const elapsedDays = Math.min(7, Math.floor((Date.now() - weekStart.getTime())/86400000) + 1);
    const weekEntries = allRich.filter(h=>h.ts >= weekStart.getTime());
    const goalRoutines = routines.filter(r=>r.weeklyGoalMin > 0);
    if(goalRoutines.length){
      let goalsHtml = goalRoutines.map(r=>{
        const doneMin = Math.round(weekEntries.filter(h=>h.routineId===r.id).reduce((a,h)=>a+(h.actualSec||0),0)/60);
        const pct = Math.min(100, Math.round(doneMin / r.weeklyGoalMin * 100));
        const expMin = Math.round(r.weeklyGoalMin * elapsedDays / 7);
        const expPct = Math.min(100, Math.round(expMin / r.weeklyGoalMin * 100));
        const onPace = doneMin >= expMin;
        return `
        <div class="bar-row tappable" data-rstats="${r.id}">
          <div class="bar-name">${r.icon?escapeHtml(r.icon)+" ":""}${escapeHtml(r.name)}</div>
          <div class="bar-track goal-track"><div class="bar-fill" style="width:${Math.max(3,pct)}%; background:${fillStyle(r.color)}"></div><span class="goal-marker" style="left:${expPct}%"></span></div>
          <div class="bar-val ${onPace?'early':'late'}" style="color:${onPace?'var(--good)':'var(--danger)'}">${doneMin}/${r.weeklyGoalMin}m</div>
        </div>`;
      }).join("");
      body.innerHTML += `<div class="section-label">Metas da semana (seg&ndash;dom) · | = esperado até hoje</div><div class="stat-card">${goalsHtml}</div>`;
    }

    /* --- tempo por rotina no período (toque abre detalhe) --- */
    const byRoutine = {};
    rich.forEach(h=>{ const k = h.routineId; byRoutine[k] = byRoutine[k] || {name:h.routineName, sec:0}; byRoutine[k].sec += (h.actualSec||0); });
    // período anterior de mesma duração (para o delta %)
    let prevByRoutine = {};
    if(statsPeriod !== "tudo"){
      const startTs = periodStartTs();
      const prevStart = startTs - (Date.now() - startTs);
      history.filter(h=>h.ts && h.ts >= prevStart && h.ts < startTs).forEach(h=>{
        prevByRoutine[h.routineId] = (prevByRoutine[h.routineId]||0) + (h.actualSec||0);
      });
    }
    const pairs = Object.entries(byRoutine).sort((a,b)=>b[1].sec-a[1].sec);
    if(pairs.length){
      const max = pairs[0][1].sec;
      let barsHtml = pairs.map(([id,o])=>{
        let delta = "";
        if(statsPeriod !== "tudo" && prevByRoutine[id]){
          const pct = Math.round((o.sec - prevByRoutine[id]) / prevByRoutine[id] * 100);
          delta = `<span class="${pct>=0?'early':'late'}" style="font-size:11px; color:${pct>=0?'var(--good)':'var(--danger)'}">${pct>=0?'+':''}${pct}%</span>`;
        } else if(statsPeriod !== "tudo" && o.sec > 0){
          delta = `<span class="dev-n" style="font-size:11px;">novo</span>`;
        }
        return `
        <div class="bar-row tappable" data-rstats="${id}">
          <div class="bar-name">${escapeHtml(o.name)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.max(4,(o.sec/max)*100)}%"></div></div>
          <div class="bar-val">${Math.round(o.sec/60)}m ${delta}</div>
        </div>`;
      }).join("");
      body.innerHTML += `<div class="section-label">Tempo por rotina (${statsPeriod}) vs período anterior</div><div class="stat-card">${barsHtml}</div>`;
    }

    /* --- distribuição por dia da semana, empilhada por rotina --- */
    const DOWL = ["D","S","T","Q","Q","S","S"];
    const dowStack = Array.from({length:7}, ()=> ({}));
    rich.forEach(h=>{
      const dow = new Date(h.ts).getDay();
      dowStack[dow][h.routineId] = (dowStack[dow][h.routineId]||0) + (h.actualSec||0);
    });
    const dowTotals = dowStack.map(o=>Object.values(o).reduce((a,b)=>a+b,0));
    const maxDow = Math.max(...dowTotals, 1);
    if(dowTotals.some(t=>t>0)){
      let stackHtml = `<div class="stack-chart">` + dowStack.map((o,dow)=>{
        const segs = Object.entries(o).map(([rid,sec])=>{
          const r = routines.find(x=>x.id===rid);
          const h = Math.max(2, sec/maxDow*80);
          return `<div class="stack-seg" style="height:${h}px; background:${solidColor(r&&r.color)}" title="${r?escapeHtml(r.name):''}: ${Math.round(sec/60)}min"></div>`;
        }).join("");
        return `<div class="stack-col"><div class="stack-bars">${segs}</div><span class="trend-lbl">${DOWL[dow]}</span><span class="trend-val">${dowTotals[dow]?Math.round(dowTotals[dow]/60)+"m":""}</span></div>`;
      }).join("") + `</div>`;
      body.innerHTML += `<div class="section-label">Por dia da semana (${statsPeriod})</div><div class="stat-card">${stackHtml}</div>`;
    }

    /* --- histograma de horário de início --- */
    const hourCounts = new Array(24).fill(0);
    rich.forEach(h=>{ hourCounts[new Date(startTsOf(h)).getHours()]++; });
    const maxHour = Math.max(...hourCounts, 1);
    if(hourCounts.some(c=>c>0)){
      let hHtml = `<div class="hour-chart">` + hourCounts.map((c,hh)=>{
        const bh = c ? Math.max(3, c/maxHour*54) : 0;
        return `<div class="hour-col"><div class="hour-bar" style="height:${bh}px"></div>${hh%6===0?`<span class="trend-lbl">${hh}h</span>`:'<span class="trend-lbl"></span>'}</div>`;
      }).join("") + `</div>`;
      body.innerHTML += `<div class="section-label">Horário real de início (${statsPeriod})</div><div class="stat-card">${hHtml}</div>`;
    }

    /* --- taxa de cumprimento do agendado --- */
    const startPer = periodStartTs() || (allRich.length ? allRich[0].ts : Date.now());
    const schedRoutines = routines.filter(r=>r.schedule && r.schedule.enabled);
    if(schedRoutines.length){
      let compHtml = schedRoutines.map(r=>{
        let plannedDays = 0, doneDays = 0;
        const effStart = Math.max(startPer, r.createdAt || 0);
        const d = new Date(effStart); d.setHours(12,0,0,0);
        const today = new Date(); today.setHours(12,0,0,0);
        const doneSet = new Set(history.filter(h=>h.routineId===r.id).map(h=>h.date));
        let guard = 0;
        while(d <= today && guard++ < 400){
          if(r.schedule.days.includes(d.getDay()) && !snoozedOn(d)){
            plannedDays++;
            if(doneSet.has(dateKey(d))) doneDays++;
          }
          d.setDate(d.getDate()+1);
        }
        if(plannedDays === 0) return "";
        const pct = Math.round(doneDays/plannedDays*100);
        const cls = pct >= 80 ? "early" : (pct >= 50 ? "ontime" : "late");
        return `<div class="dev-row tappable" data-rstats="${r.id}"><span>${r.icon?escapeHtml(r.icon)+" ":""}${escapeHtml(r.name)}</span><b class="${cls}">${pct}%</b><span class="dev-n">${doneDays}/${plannedDays} dias</span></div>`;
      }).join("");
      if(compHtml) body.innerHTML += `<div class="section-label">Cumprimento do agendado (${statsPeriod})</div><div class="stat-card">${compHtml}</div>`;
    }

    /* --- sequências por rotina --- */
    const streakRows = routines.map(r=>({id:r.id, name:r.name, icon:r.icon, s:computeStreakFor(r.id)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s);
    if(streakRows.length){
      let sHtml = streakRows.map(x=>`<div class="dev-row tappable" data-rstats="${x.id}"><span>${x.icon?escapeHtml(x.icon)+" ":""}${escapeHtml(x.name)}</span><b class="ontime">${x.s} dia${x.s>1?'s':''}</b></div>`).join("");
      body.innerHTML += `<div class="section-label">Sequências por rotina</div><div class="stat-card">${sHtml}</div>`;
    }

    /* --- desvio: mediana + faixa + n --- */
    const devByRoutine = {};
    rich.forEach(h=>{
      if(!h.plannedSec) return;
      (devByRoutine[h.routineId] = devByRoutine[h.routineId] || {name:h.routineName, arr:[]}).arr.push(h.actualSec - h.plannedSec);
    });
    const devPairs = Object.entries(devByRoutine);
    if(devPairs.length){
      let devHtml = devPairs.map(([id,o])=>{
        const med = Math.round(median(o.arr));
        const mn = Math.min(...o.arr), mx = Math.max(...o.arr);
        const cls = med > 30 ? "late" : (med < -30 ? "early" : "ontime");
        const fmt = v => (v>=0?"+":"&minus;") + fmtTime(Math.abs(v)).replace("+","");
        return `<div class="dev-row tappable" data-rstats="${id}"><span>${escapeHtml(o.name)}</span><b class="${cls}">${fmt(med)}</b><span class="dev-n">${fmt(mn)}..${fmt(mx)} · ${o.arr.length}x</span></div>`;
      }).join("");
      body.innerHTML += `<div class="section-label">Desvio mediano [mín..máx] (${statsPeriod})</div><div class="stat-card">${devHtml}</div>`;
    }

    /* --- interrupções --- */
    const pauseData = rich.filter(h=>h.pauses !== undefined);
    if(pauseData.length){
      const byR = {};
      pauseData.forEach(h=>{ (byR[h.routineName] = byR[h.routineName]||[]).push(h); });
      let pHtml = Object.entries(byR).map(([name,arr])=>{
        const avgP = (arr.reduce((a,h)=>a+h.pauses,0)/arr.length).toFixed(1).replace(".",",");
        const avgT = Math.round(arr.reduce((a,h)=>a+(h.pausedSec||0),0)/arr.length);
        return `<div class="dev-row"><span>${escapeHtml(name)}</span><span class="dev-n">${avgP} pausas/exec</span><span class="dev-n">${fmtTime(avgT).replace("+","")} médio</span></div>`;
      }).join("");
      body.innerHTML += `<div class="section-label">Interrupções (${statsPeriod})</div><div class="stat-card">${pHtml}</div>`;
    }

    /* --- pontualidade --- */
    const punc = rich.filter(h=>h.schedDelayMin !== undefined);
    if(punc.length){
      const byR = {};
      punc.forEach(h=>{ (byR[h.routineName] = byR[h.routineName]||[]).push(h.schedDelayMin); });
      let puncHtml = Object.entries(byR).map(([name,arr])=>{
        const med = Math.round(median(arr));
        const cls = med > 5 ? "late" : (med < -5 ? "early" : "ontime");
        const label = med === 0 ? "em ponto" : (med > 0 ? med+"min atrasado" : Math.abs(med)+"min adiantado");
        return `<div class="dev-row"><span>${escapeHtml(name)}</span><b class="${cls}">${label}</b><span class="dev-n">${arr.length}x</span></div>`;
      }).join("");
      body.innerHTML += `<div class="section-label">Pontualidade mediana (${statsPeriod})</div><div class="stat-card">${puncHtml}</div>`;
    }

    /* --- tendência 8 semanas com n --- */
    function weekKey(ts){
      const d = new Date(ts);
      const day = (d.getDay()+6)%7;
      d.setDate(d.getDate()-day); d.setHours(0,0,0,0);
      return d.getTime();
    }
    const now8 = weekKey(Date.now());
    const weeks = [];
    for(let w=7; w>=0; w--) weeks.push(now8 - w*7*86400000);
    const devByWeek = {}, delayByWeek = {};
    allRich.forEach(h=>{
      const wk = weekKey(h.ts);
      if(h.plannedSec) (devByWeek[wk] = devByWeek[wk]||[]).push((h.actualSec - h.plannedSec)/60);
      if(h.schedDelayMin !== undefined) (delayByWeek[wk] = delayByWeek[wk]||[]).push(h.schedDelayMin);
    });
    function trendBars(byWeek, unit){
      const buckets = weeks.map(wk => byWeek[wk] || null);
      const vals = buckets.map(b => b ? median(b) : null);
      const maxAbs = Math.max(1, ...vals.filter(v=>v!==null).map(v=>Math.abs(v)));
      return `<div class="trend-chart">` + vals.map((v,i)=>{
        const d = new Date(weeks[i]);
        const lbl = String(d.getDate()).padStart(2,"0") + "/" + String(d.getMonth()+1).padStart(2,"0");
        if(v === null) return `<div class="trend-col"><div class="trend-bar-area"></div><span class="trend-lbl">${lbl}</span><span class="trend-val"></span></div>`;
        const h = Math.max(6, Math.abs(v)/maxAbs*46);
        const cls = v > 0.5 ? "late" : (v < -0.5 ? "early" : "ontime");
        const valLbl = (v>=0?"+":"&minus;") + Math.abs(v).toFixed(1).replace(".",",");
        return `<div class="trend-col"><div class="trend-bar-area"><span class="trend-val">${valLbl}</span><div class="trend-bar ${cls}" style="height:${h}px"></div></div><span class="trend-lbl">${lbl}</span><span class="trend-val">n=${buckets[i].length}</span></div>`;
      }).join("") + `</div><div class="stat-foot">${unit} · mediana semanal</div>`;
    }
    if(Object.keys(devByWeek).length){
      body.innerHTML += `<div class="section-label">Tendência do desvio (8 semanas)</div><div class="stat-card">${trendBars(devByWeek, "minutos além/aquém do planejado")}</div>`;
    }
    if(Object.keys(delayByWeek).length){
      body.innerHTML += `<div class="section-label">Tendência da pontualidade (8 semanas)</div><div class="stat-card">${trendBars(delayByWeek, "minutos de atraso no início")}</div>`;
    }

    /* --- execuções recentes --- */
    const recent = [...rich].sort((a,b)=>b.ts-a.ts).slice(0,8);
    if(recent.length){
      let recHtml = recent.map(h=>{
        const d = new Date(h.ts);
        const dateStr = String(d.getDate()).padStart(2,"0") + "/" + String(d.getMonth()+1).padStart(2,"0") + " " + fmtClock(d);
        const cmp = h.plannedSec ? `${fmtTime(h.plannedSec).replace("+","")} &rarr; ${fmtTime(h.actualSec).replace("+","")}` : fmtTime(h.actualSec||0).replace("+","");
        return `<div class="dev-row"><span>${escapeHtml(h.routineName)}</span><span class="dev-n">${cmp}</span><span class="dev-n">${dateStr}</span></div>`;
      }).join("");
      body.innerHTML += `<div class="section-label">Execuções recentes (${statsPeriod})</div><div class="stat-card">${recHtml}</div>`;
    }

    body.innerHTML += `<div style="height:20px"></div>`;

    wireHeatmapTaps(body, render);
    body.querySelectorAll("[data-rstats]").forEach(row=>{
      row.onclick = () => { view = { tab:"stats", screen:"routineStats", id: row.dataset.rstats }; render(); };
    });
  }

  /* ============ VISÃO MENSAL ============ */
  function renderMonthView(body){
    const MONTH_NAMES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    const y = calMonth.getFullYear(), mo = calMonth.getMonth();
    const first = new Date(y, mo, 1, 12);
    const daysInMonth = new Date(y, mo+1, 0).getDate();
    const todayK = dateKey(new Date());
    const byDate = minutesByDate(history);

    let nav = `
      <div class="cal-nav">
        <button class="bell-btn" id="prevMonth">&lsaquo;</button>
        <span class="cal-title">${MONTH_NAMES[mo]} ${y}</span>
        <button class="bell-btn" id="nextMonth">&rsaquo;</button>
      </div>`;

    const DOWL = ["D","S","T","Q","Q","S","S"];
    let grid = `<div class="mcal-grid">` + DOWL.map(l=>`<span class="mcal-dowlbl">${l}</span>`).join("");
    for(let b=0; b<first.getDay(); b++) grid += `<span class="mcal-cell mcal-void"></span>`;

    let plannedTotal = 0, doneTotal = 0, missedTotal = 0;
    for(let day=1; day<=daysInMonth; day++){
      const d = new Date(y, mo, day, 12);
      const key = dateKey(d);
      const dow = d.getDay();
      const executed = history.filter(h=>h.date === key);
      const execIds = new Set(executed.map(h=>h.routineId));
      const planned = routines.filter(r=>{
        if(!(r.schedule && r.schedule.enabled && r.schedule.days.includes(dow))) return false;
        if(r.createdAt && d.getTime() < new Date(new Date(r.createdAt).setHours(0,0,0,0)).getTime()) return false;
        if(snoozedOn(d)) return false;
        return true;
      });
      const isPast = key < todayK;
      const missed = isPast ? planned.filter(r=>!execIds.has(r.id)).length : 0;
      if(isPast || key === todayK){ plannedTotal += planned.length; doneTotal += planned.filter(r=>execIds.has(r.id)).length; missedTotal += missed; }

      let dots = [...execIds].slice(0,3).map(id=>{
        const r = routines.find(x=>x.id===id);
        return `<span class="mcal-dot" style="background:${solidColor(r&&r.color)}"></span>`;
      }).join("");
      if(executed.length > 0 && execIds.size === 0) dots = `<span class="mcal-dot" style="background:var(--muted)"></span>`;

      grid += `<span class="mcal-cell ${key===todayK?'mcal-today':''} ${key===selectedDay?'mcal-sel':''}" data-day="${key}">
        <span class="mcal-num">${day}</span>
        <span class="mcal-dots">${dots}</span>
        ${missed>0?`<span class="mcal-missed">${missed}</span>`:""}
      </span>`;
    }
    grid += `</div>`;

    const rate = plannedTotal > 0 ? Math.round(doneTotal/plannedTotal*100) : null;
    body.innerHTML = nav + `<div class="stat-card">${grid}
      <div class="stat-foot">&#9679; executada &nbsp; <span class="late" style="font-weight:600;">n</span> agendadas não feitas${rate!==null?` &nbsp;·&nbsp; cumprimento do mês: ${rate}% (${doneTotal}/${plannedTotal})`:""}</div></div>`;
    if(selectedDay) body.innerHTML += dayDetailHtml(selectedDay);
    body.innerHTML += `<div style="height:20px"></div>`;

    document.getElementById("prevMonth").onclick = () => { calMonth = new Date(y, mo-1, 1); selectedDay = null; render(); };
    document.getElementById("nextMonth").onclick = () => { calMonth = new Date(y, mo+1, 1); selectedDay = null; render(); };
    body.querySelectorAll("[data-day]").forEach(cell=>{
      cell.onclick = () => { selectedDay = selectedDay === cell.dataset.day ? null : cell.dataset.day; render(); };
    });
  }

  /* ============ VISÃO ANUAL ============ */
  function renderYearView(body){
    const byDateAll = minutesByDate(history);
    let nav = `
      <div class="cal-nav">
        <button class="bell-btn" id="prevYear">&lsaquo;</button>
        <span class="cal-title">${calYear}</span>
        <button class="bell-btn" id="nextYear">&rsaquo;</button>
      </div>`;

    const from = new Date(calYear, 0, 1, 12);
    const to = calYear === new Date().getFullYear() ? new Date() : new Date(calYear, 11, 31, 12);
    to.setHours(12,0,0,0);

    body.innerHTML = nav + `<div class="stat-card" id="yearHm">${heatmapHtml(from, to, byDateAll)}</div>`;
    if(selectedDay) body.innerHTML += dayDetailHtml(selectedDay);

    /* horas por mês */
    const MONTHS = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
    const monthMin = new Array(12).fill(0);
    history.forEach(h=>{
      if(!h.date.startsWith(String(calYear))) return;
      monthMin[+h.date.slice(5,7)-1] += Math.round((h.actualSec||0)/60);
    });
    const totalYear = monthMin.reduce((a,b)=>a+b,0);
    if(totalYear > 0){
      const maxM = Math.max(...monthMin, 1);
      let mHtml = monthMin.map((min,i)=>`
        <div class="bar-row">
          <div class="bar-name">${MONTHS[i]}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${min?Math.max(3,min/maxM*100):0}%"></div></div>
          <div class="bar-val">${min>=60 ? (min/60).toFixed(1).replace(".",",")+"h" : min+"m"}</div>
        </div>`).join("");
      body.innerHTML += `<div class="section-label">Tempo por mês · total ${(totalYear/60).toFixed(1).replace(".",",")}h</div><div class="stat-card">${mHtml}</div>`;
    } else {
      body.innerHTML += `<div class="stat-card"><div class="dev-n">Sem execuções em ${calYear}.</div></div>`;
    }
    body.innerHTML += `<div style="height:20px"></div>`;

    document.getElementById("prevYear").onclick = () => { calYear--; selectedDay = null; render(); };
    document.getElementById("nextYear").onclick = () => { calYear++; selectedDay = null; render(); };
    wireHeatmapTaps(body, render);
  }

  /* ============ DETALHE POR ROTINA ============ */
  function renderRoutineStats(){
    const r = routines.find(x=>x.id===view.id);
    const el = document.createElement("div");
    el.className = "screen";
    if(!r){
      el.innerHTML = `<div class="topbar"><button class="link-btn muted" id="backStats">&larr; Dados</button></div><div class="empty-state"><h2>Rotina não encontrada</h2></div>`;
      app.appendChild(el);
      document.getElementById("backStats").onclick = () => { view={tab:"stats",screen:"stats"}; render(); };
      return;
    }
    el.innerHTML = `
      <div class="topbar">
        <button class="link-btn muted" id="backStats">&larr; Dados</button>
        <span class="section-label" style="margin:0;">${r.icon?escapeHtml(r.icon)+" ":""}${escapeHtml(r.name)}</span>
      </div>`;
    const body = document.createElement("div");
    body.style.cssText = "overflow-y:auto; flex:1; padding-bottom:20px;";
    el.appendChild(body);
    app.appendChild(el);
    document.getElementById("backStats").onclick = () => { view={tab:"stats",screen:"stats"}; render(); };

    const entries = history.filter(h=>h.routineId===r.id && h.ts);
    const all = history.filter(h=>h.routineId===r.id);
    if(all.length === 0){
      body.innerHTML = `<div class="empty-state" style="min-height:40vh;"><h2>Sem execuções</h2><p>Conclua esta rotina para gerar dados.</p></div>`;
      return;
    }

    /* resumo */
    const totalMin = Math.round(entries.reduce((a,h)=>a+(h.actualSec||0),0)/60);
    const devs = entries.filter(h=>h.plannedSec).map(h=>h.actualSec-h.plannedSec);
    const delays = entries.filter(h=>h.schedDelayMin!==undefined).map(h=>h.schedDelayMin);
    const fmtS = v => (v>=0?"+":"&minus;") + fmtTime(Math.abs(v)).replace("+","");
    body.innerHTML += `<div class="section-label">Resumo geral</div><div class="stat-card">
      <div class="dev-row"><span>Execuções</span><b class="ontime">${all.length}</b></div>
      <div class="dev-row"><span>Tempo total registrado</span><b class="ontime">${totalMin>=60?(totalMin/60).toFixed(1).replace(".",",")+"h":totalMin+"min"}</b></div>
      <div class="dev-row"><span>Sequência atual</span><b class="ontime">${computeStreakFor(r.id)} dia(s)</b></div>
      ${devs.length?`<div class="dev-row"><span>Desvio mediano</span><b class="${median(devs)>30?'late':median(devs)<-30?'early':'ontime'}">${fmtS(Math.round(median(devs)))}</b><span class="dev-n">${devs.length}x</span></div>`:""}
      ${(()=>{ const moods = entries.filter(h=>h.mood).map(h=>h.mood); if(!moods.length) return ""; const m = Math.round(median(moods)); return `<div class="dev-row"><span>Humor mediano</span><b class="ontime">${["&#128534;","&#128533;","&#128528;","&#128578;","&#128516;"][m-1]}</b><span class="dev-n">${moods.length}x</span></div>`; })()}
      ${delays.length?`<div class="dev-row"><span>Atraso mediano no início</span><b class="${median(delays)>5?'late':'ontime'}">${Math.round(median(delays))}min</b><span class="dev-n">${delays.length}x</span></div>`:""}
    </div>`;

    /* análise por etapa */
    const stepAgg = {};
    entries.forEach(h=> (h.steps||[]).forEach(s=>{
      if(s.isRest || s.skipped || s.planned == null) return;
      const base = s.name.replace(/ · volta \d+\/\d+$/,"");
      const a = stepAgg[base] = stepAgg[base] || {n:0, acts:[], plan:s.planned};
      a.n++; a.acts.push(s.actual); a.plan = s.planned;
    }));
    const stepRows = Object.entries(stepAgg)
      .map(([name,a])=>({name, n:a.n, medAct: Math.round(median(a.acts)), plan:a.plan}))
      .map(s=>Object.assign(s, {medDev: s.medAct - s.plan}))
      .sort((a,b)=>b.medDev-a.medDev);
    if(stepRows.length){
      let sHtml = stepRows.map((s,si)=>{
        const cls = s.medDev > 15 ? "late" : (s.medDev < -15 ? "early" : "ontime");
        // sugerir ajuste: n>=3 e desvio mediano >= 30s e >= 20% do planejado
        const suggest = s.n >= 3 && Math.abs(s.medDev) >= 30 && Math.abs(s.medDev) >= s.plan*0.2
          && r.steps.some(st=>st.name===s.name && st.type==="timer");
        return `<div class="dev-row"><span>${escapeHtml(s.name)}</span><b class="${cls}">${fmtS(s.medDev)}</b><span class="dev-n">${fmtTime(s.plan).replace("+","")}&rarr;${fmtTime(s.medAct).replace("+","")} · ${s.n}x</span></div>
        ${suggest ? `<div class="suggest-row"><span class="dev-n">A mediana real é ${fmtTime(s.medAct).replace("+","")}.</span><button class="suggest-btn" data-adjust="${si}">ajustar para ${Math.ceil(s.medAct/30)*30/60 % 1 === 0 ? (Math.ceil(s.medAct/30)*30/60)+"min" : fmtTime(Math.ceil(s.medAct/30)*30).replace("+","")}</button></div>` : ""}`;
      }).join("");
      body.innerHTML += `<div class="section-label">Por etapa (desvio mediano)</div><div class="stat-card">${sHtml}</div>`;
      body.querySelectorAll("[data-adjust]").forEach(b=>{
        b.onclick = () => {
          const s = stepRows[+b.dataset.adjust];
          const newSec = Math.ceil(s.medAct/30)*30;
          confirmModal("Ajustar a etapa <b>"+escapeHtml(s.name)+"</b> de "+fmtTime(s.plan).replace("+","")+" para "+fmtTime(newSec).replace("+","")+"?", "Ajustar", ()=>{
            r.steps.forEach(st=>{ if(st.name===s.name && st.type==="timer") st.seconds = newSec; });
            save(K_ROUTINES, routines);
            showAlertBanner("Etapa ajustada ✓");
            render();
          });
        };
      });
    }

    /* horário de início desta rotina */
    const hourCounts = new Array(24).fill(0);
    entries.forEach(h=>{ hourCounts[new Date(startTsOf(h)).getHours()]++; });
    if(hourCounts.some(c=>c>0)){
      const maxHour = Math.max(...hourCounts, 1);
      let hHtml = `<div class="hour-chart">` + hourCounts.map((c,hh)=>{
        const bh = c ? Math.max(3, c/maxHour*54) : 0;
        return `<div class="hour-col"><div class="hour-bar" style="height:${bh}px; ${c?`background:${fillStyle(r.color)};`:""}"></div>${hh%6===0?`<span class="trend-lbl">${hh}h</span>`:'<span class="trend-lbl"></span>'}</div>`;
      }).join("") + `</div>`;
      body.innerHTML += `<div class="section-label">Horário real de início</div><div class="stat-card">${hHtml}</div>`;
    }

    /* execuções */
    const recent = [...entries].sort((a,b)=>b.ts-a.ts).slice(0,15);
    if(recent.length){
      let recHtml = recent.map(h=>{
        const d = new Date(h.ts);
        const dateStr = String(d.getDate()).padStart(2,"0") + "/" + String(d.getMonth()+1).padStart(2,"0") + " " + fmtClock(d);
        const cmp = h.plannedSec ? `${fmtTime(h.plannedSec).replace("+","")} &rarr; ${fmtTime(h.actualSec).replace("+","")}` : fmtTime(h.actualSec||0).replace("+","");
        const mood = h.mood ? ["&#128534;","&#128533;","&#128528;","&#128578;","&#128516;"][h.mood-1] : "";
        return `<div class="dev-row"><span class="dev-n">${dateStr}</span><span class="dev-n">${cmp} ${mood}</span><button class="del-exec" data-delexec="${h.ts}">&#10005;</button></div>`;
      }).join("");
      body.innerHTML += `<div class="section-label">Últimas execuções · &#10005; apaga o registro</div><div class="stat-card">${recHtml}</div>`;
      body.querySelectorAll("[data-delexec]").forEach(b=>{
        b.onclick = () => {
          confirmModal("Apagar este registro de execução?<br><small>Ele sai de todas as estatísticas.</small>", "Apagar", ()=>{
            history = history.filter(h=>String(h.ts) !== b.dataset.delexec);
            save(K_HISTORY, history);
            render();
          });
        };
      });
    }
  }

  /* ================= MODELOS ================= */
  const K_MKFREQ = "rotinas_v2_mkfreq";

  const GROCERY_DB = {

  function guessAisle(name){
    const n = name.trim().toLowerCase();
    if(mkFreq[n] && mkFreq[n].aisle) return mkFreq[n].aisle;
    for(const [aisle, items] of Object.entries(GROCERY_DB)){
      if(items.some(it => n === it || n.includes(it) || (it.includes(n) && n.length >= 4))) return aisle;
    }
    return "Outros";
  }
  function brl(v){ return "R$ " + (v||0).toFixed(2).replace(".",","); }

      doc.aisleOrder = [...AISLES];
      doc.shopMode = false;

        doc.axisX = "Ajuda ↔ Atrapalha"; doc.axisY = "Interno ↕ Externo";

  function tmplMeta(t){
    if(t.type === "market"){ const p = (t.items||[]).filter(i=>!i.checked).length; return p + " pendente(s) de " + (t.items||[]).length; }
    if(t.type === "matrix") return (t.quadrants||[]).map(q=>q.items.length).reduce((a,b)=>a+b,0) + " item(ns)";
    if(t.type === "kanban") return (t.cols||[]).map(c=>c.items.length).join(" / ");
    if(t.type === "countdown"){
      const next = (t.targets||[]).map(x=>({...x, days: daysUntil(x.date)})).filter(x=>x.days>=0).sort((a,b)=>a.days-b.days)[0];
      return next ? escapeHtml(next.title) + " em " + next.days + "d" : (t.targets||[]).length + " alvo(s)";
    }
    if(t.type === "expenses"){
      const mk = localKey().slice(0,7);
      const tot = (t.entries||[]).filter(e=>e.date.startsWith(mk)).reduce((a,e)=>a+e.value,0);
      return brl(tot) + " este mês";
    }
    if(t.type === "proscons"){
      const s = (t.pros||[]).reduce((a,i)=>a+i.w,0) - (t.cons||[]).reduce((a,i)=>a+i.w,0);
      return "placar " + (s>0?"+":"") + s;
    }
    if(t.type === "travel"){
      const all = (t.sections||[]).flatMap(s=>s.items);
      return all.filter(i=>!i.checked).length + " pendente(s) de " + all.length;
    }
    return "";
  }
  function daysUntil(dateStr){
    const target = new Date(dateStr + "T12:00:00");
    const today = new Date(); today.setHours(12,0,0,0);
    return Math.round((target - today)/86400000);
  }

  }

  /* cabeçalho comum dos documentos */
  function tmplHeader(el, doc, extraButtons){
    const top = document.createElement("div");
    top.className = "topbar";
    top.innerHTML = `
      <button class="link-btn muted" id="backTmpl">&larr; Modelos</button>
      <div style="display:flex; gap:7px; flex-wrap:wrap; justify-content:flex-end;">${extraButtons||""}
        <button class="icon-btn" id="delTmpl" style="color:var(--danger); border-color:var(--danger);">&#128465;</button>
      </div>`;
    el.appendChild(top);
    const titleInput = document.createElement("input");
    titleInput.className = "note-title-input"; titleInput.value = doc.title;
    titleInput.oninput = e => { doc.title = e.target.value; saveTemplates(doc); };
    el.appendChild(titleInput);
    setTimeout(()=>{
      const back = document.getElementById("backTmpl");
      if(back) back.onclick = () => { view = { tab:"templates", screen:"templates" }; render(); };
      const del = document.getElementById("delTmpl");
      if(del) del.onclick = () => {
        confirmModal("Excluir <b>"+escapeHtml(doc.title)+"</b>?", "Excluir", ()=>{
          templates = templates.filter(t=>t.id!==doc.id); save(K_TEMPLATES, templates);
          view = { tab:"templates", screen:"templates" }; render();
        });
      };
    }, 0);
  }

  /* ============ LISTA DE MERCADO ============ */
  let mkEditId = null, mkReorderAisles = false;
  function renderMarketDoc(doc){
    if(!doc.aisleOrder) doc.aisleOrder = [...AISLES];
    const el = document.createElement("div");
    el.className = "screen";
    tmplHeader(el, doc, `
      <button class="icon-btn ${doc.shopMode?'pin-btn pinned':''}" id="mkShop" title="Modo compra">&#128722;</button>
      <button class="icon-btn" id="mkRebuy" title="Recomprar (desmarcar tudo)">&#8635;</button>
      <button class="icon-btn" id="mkShare" title="Compartilhar como texto">&#8599;</button>
    `);

    if(!doc.shopMode){
      const form = document.createElement("div");
      form.className = "market-form";
      const freqChips = Object.values(mkFreq)
        .sort((a,b)=>b.count-a.count).slice(0,8)
        .filter(f=>!doc.items.some(i=>i.name.toLowerCase()===f.name.toLowerCase()));
      form.innerHTML = `
        ${freqChips.length ? `<div class="mk-chips"><span class="dev-n" style="margin-right:2px;">frequentes:</span>${freqChips.map(f=>`<span class="tag-chip" data-freq="${escapeHtml(f.name)}">${escapeHtml(f.name)}</span>`).join("")}</div>` : ""}
        <input type="text" id="mkName" placeholder="Item" autocomplete="off">
        <div class="mk-chips" id="mkSuggest"></div>
        <div class="market-form-row">
          <input type="number" id="mkQty" inputmode="decimal" min="0" step="any" placeholder="qtd" value="1">
          <select id="mkUnit"><option value="un">un</option><option value="g">g</option><option value="kg">kg</option><option value="L">L</option><option value="ml">ml</option></select>
          <input type="number" id="mkPrice" inputmode="decimal" min="0" step="0.01" placeholder="R$ (opc)">
          <select id="mkAisle">${doc.aisleOrder.map(a=>`<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join("")}</select>
          <button class="btn-primary" id="mkAdd" style="flex:0 0 auto; padding:10px 16px;">+</button>
        </div>`;
      el.appendChild(form);
    }

    const listBox = document.createElement("div");
    listBox.style.cssText = "overflow-y:auto; flex:1; padding-bottom:20px;";
    el.appendChild(listBox);
    app.appendChild(el);

    const nameInp = document.getElementById("mkName");
    const aisleSel = document.getElementById("mkAisle");
    const suggestBox = document.getElementById("mkSuggest");
    const allSuggestions = [...new Set(Object.values(GROCERY_DB).flat().concat(Object.values(mkFreq).map(f=>f.name)))];

    if(nameInp){
      nameInp.oninput = () => {
        aisleSel.value = guessAisle(nameInp.value);
        const q = nameInp.value.trim().toLowerCase();
        if(q.length < 2){ suggestBox.innerHTML = ""; return; }
        const matches = allSuggestions.filter(s=>s.toLowerCase().includes(q)).slice(0,6);
        suggestBox.innerHTML = matches.map(m=>`<span class="tag-chip" data-sug="${escapeHtml(m)}">${escapeHtml(m)}</span>`).join("");
        suggestBox.querySelectorAll("[data-sug]").forEach(ch=>{
          ch.onclick = () => { nameInp.value = ch.dataset.sug; aisleSel.value = guessAisle(ch.dataset.sug); suggestBox.innerHTML = ""; nameInp.focus(); };
        });
      };
      nameInp.onkeydown = e => { if(e.key === "Enter") addItem(); };
    }

    function bumpFreq(name, unit, qty, price, aisle){
      const k = name.toLowerCase();
      const f = mkFreq[k] = mkFreq[k] || { name, count:0 };
      f.count++; f.unit = unit; f.qty = qty; f.aisle = aisle;
      if(price) f.price = price;
      save(K_MKFREQ, mkFreq);
    }

    function addItem(prefill){
      const name = prefill ? prefill.name : nameInp.value.trim();
      if(!name) return;
      const qty = prefill ? (prefill.qty||1) : (+document.getElementById("mkQty").value || 1);
      const unit = prefill ? (prefill.unit||"un") : document.getElementById("mkUnit").value;
      const price = prefill ? (prefill.price||0) : (+document.getElementById("mkPrice").value || 0);
      const aisle = prefill ? (prefill.aisle||guessAisle(name)) : aisleSel.value;
      // duplicata: mesmo nome e unidade → soma
      const dup = doc.items.find(i=>i.name.toLowerCase()===name.toLowerCase() && i.unit===unit);
      if(dup){
        dup.qty += qty;
        if(price) dup.price = (dup.price||0) + price;
        showAlertBanner("Quantidade somada em \"" + name + "\" ✓");
      } else {
        doc.items.push({ id: uid(), name, qty, unit, price, aisle, checked:false });
      }
      bumpFreq(name, unit, qty, price, aisle);
      saveTemplates(doc);
      if(!prefill){
        nameInp.value = ""; document.getElementById("mkQty").value = "1"; document.getElementById("mkPrice").value = "";
        suggestBox.innerHTML = "";
        nameInp.focus();
      }
      paintList();
    }
    const addBtn = document.getElementById("mkAdd");
    if(addBtn) addBtn.onclick = () => addItem();
    document.querySelectorAll("[data-freq]").forEach(ch=>{
      ch.onclick = () => { const f = mkFreq[ch.dataset.freq.toLowerCase()]; if(f) addItem(f); };
    });

    function itemRight(it){
      const q = it.qty + (it.unit==="un" ? " un" : it.unit);
      return q + (it.price ? " · " + brl(it.price) : "");
    }

    function paintList(){
      listBox.innerHTML = "";
      const pending = doc.items.filter(i=>!i.checked);
      const listTotal = doc.items.reduce((a,i)=>a+(i.price||0),0);
      const cartTotal = doc.items.filter(i=>i.checked).reduce((a,i)=>a+(i.price||0),0);

      if(doc.shopMode){
        listBox.innerHTML += `<div class="shop-counter">${pending.length}<span> restante(s)</span></div>`;
      }
      if(listTotal > 0){
        listBox.innerHTML += `<div class="stat-foot" style="margin:2px 0 8px;">carrinho ${brl(cartTotal)} · lista ${brl(listTotal)}</div>`;
      } else if(!doc.shopMode){
        listBox.innerHTML += `<div class="stat-foot" style="margin:2px 0 8px;">${pending.length} pendente(s) de ${doc.items.length}</div>`;
      }
      if(!doc.shopMode){
        listBox.innerHTML += `<button class="link-btn" id="mkOrderBtn" style="font-size:13px; padding:0 0 8px;">${mkReorderAisles?"concluir ordenação":"&#8645; ordenar gôndolas"}</button>`;
      }
      if(doc.items.length === 0){
        listBox.innerHTML += `<div class="empty-state" style="min-height:30vh;"><p>Adicione itens — eles serão agrupados por gôndola.</p></div>`;
      }

      const byAisle = {};
      doc.items.forEach(it=>{ (byAisle[it.aisle||"Outros"] = byAisle[it.aisle||"Outros"]||[]).push(it); });
      const order = doc.aisleOrder.concat(Object.keys(byAisle).filter(a=>!doc.aisleOrder.includes(a)));

      order.forEach((aisle, ai)=>{
        const items = byAisle[aisle];
        if(!items || !items.length){
          if(mkReorderAisles && doc.aisleOrder.includes(aisle)){
            listBox.innerHTML += `<div class="section-label" style="display:flex; align-items:center; gap:8px;">${escapeHtml(aisle)}
              <button class="order-btn" data-aup="${ai}" ${ai===0?'disabled':''}>&#9650;</button>
              <button class="order-btn" data-adown="${ai}" ${ai===order.length-1?'disabled':''}>&#9660;</button></div>`;
          }
          return;
        }
        let visible = doc.shopMode ? items.filter(i=>!i.checked) : items;
        if(doc.shopMode && visible.length === 0) return;
        visible = [...visible].sort((a,b)=>(a.checked?1:0)-(b.checked?1:0));

        let head = `<div class="section-label" style="display:flex; align-items:center; gap:8px;">${escapeHtml(aisle)}`;
        if(mkReorderAisles) head += ` <button class="order-btn" data-aup="${ai}" ${ai===0?'disabled':''}>&#9650;</button><button class="order-btn" data-adown="${ai}" ${ai===order.length-1?'disabled':''}>&#9660;</button>`;
        head += `</div>`;

        let rows = visible.map(it=>{
          if(mkEditId === it.id){
            return `<div class="mk-edit" data-editrow="${it.id}">
              <input type="text" class="mk-e-name" value="${escapeHtml(it.name)}">
              <div class="market-form-row">
                <input type="number" class="mk-e-qty" inputmode="decimal" min="0" step="any" value="${it.qty}">
                <select class="mk-e-unit">${["un","g","kg","L","ml"].map(u=>`<option ${it.unit===u?'selected':''}>${u}</option>`).join("")}</select>
                <input type="number" class="mk-e-price" inputmode="decimal" min="0" step="0.01" placeholder="R$" value="${it.price||""}">
                <select class="mk-e-aisle">${order.map(a=>`<option ${it.aisle===a?'selected':''}>${escapeHtml(a)}</option>`).join("")}</select>
              </div>
              <div class="notice-actions">
                <button data-esave="${it.id}">ok</button>
                <button class="ghost" data-edel="${it.id}" style="color:var(--danger);">excluir</button>
                <button class="ghost" data-ecancel="1">cancelar</button>
              </div>
            </div>`;
          }
          return `<div class="checklist-item mk-item ${it.checked?'checked':''}">
            <span class="checklist-box" data-mkcheck="${it.id}">${it.checked?'&#10003;':''}</span>
            <span class="txt mk-name" data-mkedit="${it.id}">${escapeHtml(it.name)}</span>
            <span class="mk-right" data-mkedit="${it.id}">${itemRight(it)}</span>
          </div>`;
        }).join("");
        listBox.innerHTML += head + `<div class="stat-card" style="padding:10px 14px;">${rows}</div>`;
      });

      if(!doc.shopMode && doc.items.some(i=>i.checked)){
        listBox.innerHTML += `<button class="add-step-btn" id="mkClearDone" style="width:100%;">limpar itens marcados</button>`;
      }

      /* handlers */
      listBox.querySelectorAll("[data-mkcheck]").forEach(b=>{
        b.onclick = () => { const it = doc.items.find(x=>x.id===b.dataset.mkcheck); it.checked = !it.checked; saveTemplates(doc); paintList(); };
      });
      listBox.querySelectorAll("[data-mkedit]").forEach(b=>{
        b.onclick = () => { mkEditId = b.dataset.mkedit; paintList(); };
      });
      listBox.querySelectorAll("[data-esave]").forEach(b=>{
        b.onclick = () => {
          const it = doc.items.find(x=>x.id===b.dataset.esave);
          const row = listBox.querySelector(`[data-editrow="${it.id}"]`);
          it.name = row.querySelector(".mk-e-name").value.trim() || it.name;
          it.qty = +row.querySelector(".mk-e-qty").value || it.qty;
          it.unit = row.querySelector(".mk-e-unit").value;
          it.price = +row.querySelector(".mk-e-price").value || 0;
          it.aisle = row.querySelector(".mk-e-aisle").value;
          mkEditId = null; saveTemplates(doc); paintList();
        };
      });
      listBox.querySelectorAll("[data-edel]").forEach(b=>{
        b.onclick = () => { doc.items = doc.items.filter(x=>x.id!==b.dataset.edel); mkEditId = null; saveTemplates(doc); paintList(); };
      });
      listBox.querySelectorAll("[data-ecancel]").forEach(b=>{ b.onclick = () => { mkEditId = null; paintList(); }; });
      listBox.querySelectorAll("[data-aup]").forEach(b=>{
        b.onclick = () => { const i = +b.dataset.aup; doc.aisleOrder = order; [doc.aisleOrder[i-1], doc.aisleOrder[i]] = [doc.aisleOrder[i], doc.aisleOrder[i-1]]; saveTemplates(doc); paintList(); };
      });
      listBox.querySelectorAll("[data-adown]").forEach(b=>{
        b.onclick = () => { const i = +b.dataset.adown; doc.aisleOrder = order; [doc.aisleOrder[i+1], doc.aisleOrder[i]] = [doc.aisleOrder[i], doc.aisleOrder[i+1]]; saveTemplates(doc); paintList(); };
      });
      const ob = document.getElementById("mkOrderBtn");
      if(ob) ob.onclick = () => { mkReorderAisles = !mkReorderAisles; paintList(); };
      const clr = document.getElementById("mkClearDone");
      if(clr) clr.onclick = () => {
        const n = doc.items.filter(i=>i.checked).length;
        confirmModal("Remover " + n + " item(ns) marcado(s)?", "Remover", ()=>{ doc.items = doc.items.filter(i=>!i.checked); saveTemplates(doc); paintList(); });
      };
    }
    paintList();

    document.getElementById("mkShop").onclick = () => { doc.shopMode = !doc.shopMode; mkEditId = null; saveTemplates(doc); render(); };
    document.getElementById("mkRebuy").onclick = () => {
      confirmModal("Desmarcar todos os itens para recomprar?", "Recomprar", ()=>{ doc.items.forEach(i=>i.checked=false); saveTemplates(doc); render(); });
    };
    document.getElementById("mkShare").onclick = () => {
      const byAisle = {};
      doc.items.filter(i=>!i.checked).forEach(it=>{ (byAisle[it.aisle||"Outros"] = byAisle[it.aisle||"Outros"]||[]).push(it); });
      let txt = doc.title + "\n";
      doc.aisleOrder.concat(Object.keys(byAisle).filter(a=>!doc.aisleOrder.includes(a))).forEach(a=>{
        if(!byAisle[a] || !byAisle[a].length) return;
        txt += "\n" + a + "\n" + byAisle[a].map(it=>"• " + it.name + " — " + it.qty + (it.unit==="un"?" un":it.unit) + (it.price?" — "+brl(it.price):"")).join("\n") + "\n";
      });
      if(navigator.share){ navigator.share({ text: txt, title: doc.title }).catch(()=>{}); }
      else copyMarkdown(txt);
    };
  }

  /* ============ MATRIZ 2×2 ============ */
  let mxEdit = null, mxExpand = null, mxShowAxes = false;
  function matrixMd(doc){
    let md = "# " + doc.title + "\n";
    if(doc.axisX || doc.axisY) md += "_Eixos: " + (doc.axisX||"—") + " × " + (doc.axisY||"—") + "_\n";
    doc.quadrants.forEach(q=>{
      md += "\n## " + q.title + " (" + q.items.length + ")\n";
      q.items.forEach((it,ii)=>{
        const ind = it.indent ? "  " : "";
        const mk = q.mode==="check" ? (it.checked?"- [x] ":"- [ ] ") : (q.mode==="ol" ? (ii+1)+". " : "- ");
        md += ind + mk + it.text + "\n";
      });
    });
    return md;
  }
  function matrixPdfHtml(doc){
    let inner = "<h1>" + escapeHtml(doc.title) + "</h1>";
    if(doc.axisX || doc.axisY) inner += `<p class="meta">Eixos: ${escapeHtml(doc.axisX||"—")} × ${escapeHtml(doc.axisY||"—")}</p>`;
    inner += `<div class="mxgrid">`;
    doc.quadrants.forEach(q=>{
      inner += `<div class="mxq" style="border-color:${q.color}"><h2 style="color:${q.color}">${escapeHtml(q.title)} (${q.items.length})</h2><ul>`;
      q.items.forEach(it=>{
        inner += `<li class="${it.indent?'sub':''} ${q.mode==='check'&&it.checked?'done':''}">${escapeHtml(it.text)}</li>`;
      });
      inner += `</ul></div>`;
    });
    return inner + `</div>`;
  }

  function renderMatrixDoc(doc){
    if(doc.axisX === undefined) doc.axisX = "";
    if(doc.axisY === undefined) doc.axisY = "";
    doc.quadrants.forEach(q=>q.items.forEach(it=>{ if(it.indent===undefined) it.indent=0; }));
    const el = document.createElement("div");
    el.className = "screen";
    tmplHeader(el, doc, `
      <button class="icon-btn" id="mxAxes" title="Rótulos dos eixos">&#10011;</button>
      <button class="icon-btn" id="mxMd" title="Copiar markdown">MD</button>
      <button class="icon-btn" id="mxPdf" title="Exportar PDF">PDF</button>
    `);

    const body = document.createElement("div");
    body.style.cssText = "flex:1; display:flex; flex-direction:column; min-height:0;";
    el.appendChild(body);
    app.appendChild(el);

    function quadHtml(q, qi, big){
      let itemsHtml = q.items.map((it,ii)=>{
        if(mxEdit && mxEdit.qi===qi && mxEdit.ii===ii){
          return `<div class="mx-editbox">
            <input type="text" class="mx-e-text" value="${escapeHtml(it.text)}">
            <div class="mx-e-tools">
              <select class="mx-e-quad">${doc.quadrants.map((qq,qqi)=>`<option value="${qqi}" ${qqi===qi?'selected':''}>${escapeHtml(qq.title.slice(0,18))}</option>`).join("")}</select>
              <button class="order-btn" data-mxind="1" title="Indentar">&#8677;</button>
              <button class="order-btn" data-mxind="0" title="Remover indentação">&#8676;</button>
              <button class="order-btn" data-mxup="1" ${ii===0?'disabled':''}>&#9650;</button>
              <button class="order-btn" data-mxdown="1" ${ii===q.items.length-1?'disabled':''}>&#9660;</button>
            </div>
            <div class="notice-actions">
              <button data-mxok="1">ok</button>
              <button class="ghost" data-mxdel="1" style="color:var(--danger);">excluir</button>
            </div>
          </div>`;
        }
        const indStyle = it.indent ? "margin-left:16px;" : "";
        if(q.mode === "check"){
          return `<div class="checklist-item ${it.checked?'checked':''}" style="margin:3px 0; font-size:${big?15:13.5}px; ${indStyle}">
            <span class="checklist-box mx-box" data-q="${qi}" data-i="${ii}" style="width:16px;height:16px;border-color:${q.color};${it.checked?`background:${q.color};`:""}">${it.checked?'&#10003;':''}</span>
            <span class="txt" style="flex:1;" data-mxe="${qi}-${ii}">${escapeHtml(it.text)}</span>
          </div>`;
        }
        const marker = q.mode === "ol" ? (q.items.slice(0,ii).filter(x=>!x.indent).length + (it.indent?0:1)) + "." : "&bull;";
        return `<div class="live-line li-line" style="font-size:${big?15:13.5}px; display:flex; align-items:flex-start; ${indStyle}">
          <span class="li-marker" style="color:${q.color};">${it.indent?"&#9702;":marker}</span>
          <span style="flex:1;" data-mxe="${qi}-${ii}">${escapeHtml(it.text)}</span>
        </div>`;
      }).join("");
      return `
        <input type="text" class="mx-title" data-qt="${qi}" value="${escapeHtml(q.title)}" style="color:${q.color}; font-size:${big?17:14}px;">
        <span class="dev-n" style="font-size:10.5px;">${q.items.length} item(ns)</span>
        <div class="mx-tools">
          <div class="mx-colors">${MATRIX_COLORS.map(c=>`<span class="color-chip mx-chip ${q.color===c?'sel':''}" data-q="${qi}" data-color="${c}" style="background:${c}; width:16px; height:16px;"></span>`).join("")}</div>
          <div style="display:flex; gap:4px; align-items:center;">
            <div class="type-toggle" style="font-size:10px;">
              ${["check","ul","ol"].map(m=>`<span data-qm="${qi}" data-mode="${m}" class="${q.mode===m?'active':''}">${m==="check"?"&#9745;":m==="ul"?"&bull;":"1."}</span>`).join("")}
            </div>
            <button class="order-btn" data-expand="${qi}" title="${big?'Voltar à grade':'Expandir'}">${big?"&#10530;":"&#10529;"}</button>
          </div>
        </div>
        <div class="mx-items">${itemsHtml}</div>
        <div class="mx-add"><input type="text" placeholder="+ item (Enter)" data-qadd="${qi}"></div>`;
    }

    function paint(){
      body.innerHTML = "";
      if(mxShowAxes || doc.axisX || doc.axisY){
        const ax = document.createElement("div");
        ax.className = "mx-axes";
        ax.innerHTML = `
          <input type="text" id="axX" placeholder="eixo horizontal" value="${escapeHtml(doc.axisX)}">
          <input type="text" id="axY" placeholder="eixo vertical" value="${escapeHtml(doc.axisY)}">`;
        ax.style.display = mxShowAxes ? "flex" : "none";
        body.appendChild(ax);
        ax.querySelector("#axX").oninput = e => { doc.axisX = e.target.value; saveTemplates(doc); };
        ax.querySelector("#axY").oninput = e => { doc.axisY = e.target.value; saveTemplates(doc); };
      }
      if(doc.axisX && !mxShowAxes) body.innerHTML += `<div class="mx-axis-x">&larr; ${escapeHtml(doc.axisX)} &rarr;</div>`;

      const expanded = mxExpand && mxExpand.docId === doc.id ? mxExpand.qi : null;
      const wrap = document.createElement("div");
      wrap.style.cssText = "flex:1; display:flex; min-height:0; gap:6px;";
      if(doc.axisY && !mxShowAxes && expanded === null){
        wrap.innerHTML += `<div class="mx-axis-y">${escapeHtml(doc.axisY)}</div>`;
      }
      const gridBox = document.createElement("div");
      if(expanded !== null){
        gridBox.className = "matrix-single";
        const q = doc.quadrants[expanded];
        const quad = document.createElement("div");
        quad.className = "matrix-quad";
        quad.style.borderColor = q.color;
        quad.style.background = q.color + "14";
        quad.innerHTML = quadHtml(q, expanded, true);
        gridBox.appendChild(quad);
      } else {
        gridBox.className = "matrix-grid";
        doc.quadrants.forEach((q,qi)=>{
          const quad = document.createElement("div");
          quad.className = "matrix-quad";
          quad.style.borderColor = q.color;
          quad.style.background = q.color + "14";
          quad.innerHTML = quadHtml(q, qi, false);
          gridBox.appendChild(quad);
        });
      }
      wrap.appendChild(gridBox);
      body.appendChild(wrap);
      wire(gridBox);
    }

    function wire(gridBox){
      gridBox.querySelectorAll("[data-qt]").forEach(inp=> inp.oninput = e => { doc.quadrants[+e.target.dataset.qt].title = e.target.value; saveTemplates(doc); });
      gridBox.querySelectorAll("[data-color]").forEach(ch=> ch.onclick = () => { doc.quadrants[+ch.dataset.q].color = ch.dataset.color; saveTemplates(doc); paint(); });
      gridBox.querySelectorAll("[data-mode]").forEach(sp=> sp.onclick = () => { doc.quadrants[+sp.dataset.qm].mode = sp.dataset.mode; saveTemplates(doc); paint(); });
      gridBox.querySelectorAll(".mx-box").forEach(b=> b.onclick = () => { const it = doc.quadrants[+b.dataset.q].items[+b.dataset.i]; it.checked = !it.checked; saveTemplates(doc); paint(); });
      gridBox.querySelectorAll("[data-mxe]").forEach(sp=>{
        sp.onclick = () => { const [qi,ii] = sp.dataset.mxe.split("-").map(Number); mxEdit = {qi,ii}; paint();
          setTimeout(()=>{ const inp = gridBox.querySelector(".mx-e-text"); if(inp){ inp.focus(); } }, 30); };
      });
      gridBox.querySelectorAll("[data-expand]").forEach(b=>{
        b.onclick = () => {
          const qi = +b.dataset.expand;
          mxExpand = (mxExpand && mxExpand.docId===doc.id && mxExpand.qi===qi) ? null : { docId:doc.id, qi };
          mxEdit = null; paint();
        };
      });
      gridBox.querySelectorAll("[data-qadd]").forEach(inp=>{
        inp.onkeydown = e => {
          if(e.key === "Enter" && inp.value.trim()){
            doc.quadrants[+inp.dataset.qadd].items.push({ text: inp.value.trim(), checked:false, indent:0 });
            saveTemplates(doc); paint();
            const again = gridBox.querySelector(`[data-qadd="${inp.dataset.qadd}"]`);
            if(again) again.focus();
          }
        };
      });
      /* editor de item */
      const box = gridBox.querySelector(".mx-editbox");
      if(box && mxEdit){
        const {qi, ii} = mxEdit;
        const q = doc.quadrants[qi];
        const it = q.items[ii];
        const commitText = () => { it.text = box.querySelector(".mx-e-text").value.trim() || it.text; };
        box.querySelector("[data-mxok]").onclick = () => {
          commitText();
          const targetQ = +box.querySelector(".mx-e-quad").value;
          if(targetQ !== qi){
            q.items.splice(ii,1);
            doc.quadrants[targetQ].items.push(it);
          }
          mxEdit = null; saveTemplates(doc); paint();
        };
        box.querySelector("[data-mxdel]").onclick = () => { q.items.splice(ii,1); mxEdit = null; saveTemplates(doc); paint(); };
        box.querySelectorAll("[data-mxind]").forEach(b=> b.onclick = () => { commitText(); it.indent = +b.dataset.mxind; saveTemplates(doc); paint(); });
        box.querySelector("[data-mxup]").onclick = () => { if(ii>0){ commitText(); [q.items[ii-1],q.items[ii]]=[q.items[ii],q.items[ii-1]]; mxEdit={qi,ii:ii-1}; saveTemplates(doc); paint(); } };
        box.querySelector("[data-mxdown]").onclick = () => { if(ii<q.items.length-1){ commitText(); [q.items[ii+1],q.items[ii]]=[q.items[ii],q.items[ii+1]]; mxEdit={qi,ii:ii+1}; saveTemplates(doc); paint(); } };
        box.querySelector(".mx-e-text").onkeydown = e => { if(e.key==="Enter") box.querySelector("[data-mxok]").click(); };
      }
    }
    paint();

    document.getElementById("mxAxes").onclick = () => { mxShowAxes = !mxShowAxes; paint(); };
    document.getElementById("mxMd").onclick = () => copyMarkdown(matrixMd(doc));
    document.getElementById("mxPdf").onclick = () => exportPdfView(doc.title, matrixPdfHtml(doc));
  }

  /* ============ KANBAN ============ */
  let kbEdit = null;
  function kanbanMd(doc){
    let md = "# " + doc.title + "\n";
    doc.cols.forEach(c=>{ md += "\n## " + c.title + " (" + c.items.length + ")\n" + c.items.map(i=>"- " + i.text).join("\n") + "\n"; });
    return md;
  }
  function renderKanbanDoc(doc){
    const el = document.createElement("div");
    el.className = "screen";
    tmplHeader(el, doc, `
      <button class="icon-btn" id="kbMd" title="Copiar markdown">MD</button>
      <button class="icon-btn" id="kbPdf" title="Exportar PDF">PDF</button>`);
    const body = document.createElement("div");
    body.className = "kb-board";
    el.appendChild(body);
    app.appendChild(el);

    function paint(){
      body.innerHTML = "";
      doc.cols.forEach((c,ci)=>{
        const col = document.createElement("div");
        col.className = "kb-col";
        let cards = c.items.map((it,ii)=>{
          if(kbEdit && kbEdit.ci===ci && kbEdit.ii===ii){
            return `<div class="kb-card kb-editing">
              <input type="text" class="kb-e-text" value="${escapeHtml(it.text)}">
              <div class="notice-actions" style="margin-top:6px;">
                <button data-kbok="1">ok</button>
                <button class="ghost" data-kbdel="1" style="color:var(--danger);">&#10005;</button>
              </div></div>`;
          }
          return `<div class="kb-card">
            <span class="kb-text" data-kbe="${ci}-${ii}">${escapeHtml(it.text)}</span>
            <div class="kb-moves">
              <button class="order-btn" data-kbl="${ci}-${ii}" ${ci===0?'disabled':''}>&lsaquo;</button>
              <button class="order-btn" data-kbr="${ci}-${ii}" ${ci===doc.cols.length-1?'disabled':''}>&rsaquo;</button>
            </div>
          </div>`;
        }).join("");
        col.innerHTML = `<div class="kb-head">${escapeHtml(c.title)} <span class="dev-n">${c.items.length}</span></div>
          <div class="kb-cards">${cards}</div>
          <input type="text" class="kb-add" placeholder="+" data-kbadd="${ci}">`;
        body.appendChild(col);
      });
      body.querySelectorAll("[data-kbe]").forEach(sp=> sp.onclick = () => { const [ci,ii]=sp.dataset.kbe.split("-").map(Number); kbEdit={ci,ii}; paint(); setTimeout(()=>{const i=body.querySelector(".kb-e-text"); if(i) i.focus();},30); });
      body.querySelectorAll("[data-kbl]").forEach(b=> b.onclick = () => { const [ci,ii]=b.dataset.kbl.split("-").map(Number); const [it]=doc.cols[ci].items.splice(ii,1); doc.cols[ci-1].items.push(it); saveTemplates(doc); paint(); });
      body.querySelectorAll("[data-kbr]").forEach(b=> b.onclick = () => { const [ci,ii]=b.dataset.kbr.split("-").map(Number); const [it]=doc.cols[ci].items.splice(ii,1); doc.cols[ci+1].items.push(it); saveTemplates(doc); paint(); });
      body.querySelectorAll("[data-kbadd]").forEach(inp=>{
        inp.onkeydown = e => { if(e.key==="Enter" && inp.value.trim()){ doc.cols[+inp.dataset.kbadd].items.push({id:uid(), text:inp.value.trim()}); saveTemplates(doc); paint(); const a=body.querySelector(`[data-kbadd="${inp.dataset.kbadd}"]`); if(a) a.focus(); } };
      });
      const eb = body.querySelector(".kb-editing");
      if(eb && kbEdit){
        const {ci,ii} = kbEdit;
        eb.querySelector("[data-kbok]").onclick = () => { doc.cols[ci].items[ii].text = eb.querySelector(".kb-e-text").value.trim() || doc.cols[ci].items[ii].text; kbEdit=null; saveTemplates(doc); paint(); };
        eb.querySelector("[data-kbdel]").onclick = () => { doc.cols[ci].items.splice(ii,1); kbEdit=null; saveTemplates(doc); paint(); };
        eb.querySelector(".kb-e-text").onkeydown = e => { if(e.key==="Enter") eb.querySelector("[data-kbok]").click(); };
      }
    }
    paint();
    document.getElementById("kbMd").onclick = () => copyMarkdown(kanbanMd(doc));
    document.getElementById("kbPdf").onclick = () => {
      let inner = "<h1>" + escapeHtml(doc.title) + "</h1>";
      doc.cols.forEach(c=>{ inner += "<h2>" + escapeHtml(c.title) + " (" + c.items.length + ")</h2><ul>" + c.items.map(i=>"<li>"+escapeHtml(i.text)+"</li>").join("") + "</ul>"; });
      exportPdfView(doc.title, inner);
    };
  }

  /* ============ CONTAGEM REGRESSIVA ============ */
  function cdPace(t){
    const days = daysUntil(t.date);
    if(t.topics == null) return null;
    const remaining = Math.max(0, t.topics - (t.done||0));
    if(days <= 0 || remaining <= 0) return { days, remaining, txt: remaining===0 ? "concluído" : "prazo esgotado" };
    const perDay = remaining / days;
    const txt = perDay >= 1
      ? perDay.toFixed(1).replace(".",",") + " tópico(s)/dia"
      : "1 tópico a cada " + (days/remaining).toFixed(1).replace(".",",") + " dias";
    return { days, remaining, txt };
  }
  function countdownMd(doc){
    let md = "# " + doc.title + "\n\n";
    doc.targets.forEach(t=>{
      const d = daysUntil(t.date);
      const [y,m,dd] = t.date.split("-");
      md += "- **" + t.title + "** — " + dd + "/" + m + "/" + y + " — " + (d>=0 ? "faltam " + d + " dia(s)" : Math.abs(d) + " dia(s) atrás");
      const p = cdPace(t);
      if(p && t.topics != null) md += " — " + (t.done||0) + "/" + t.topics + " tópicos (" + p.txt + ")";
      md += "\n";
    });
    return md;
  }
  function renderCountdownDoc(doc){
    const el = document.createElement("div");
    el.className = "screen";
    tmplHeader(el, doc, `
      <button class="icon-btn" id="cdMd" title="Copiar markdown">MD</button>
      <button class="icon-btn" id="cdPdf" title="Exportar PDF">PDF</button>`);
    const body = document.createElement("div");
    body.style.cssText = "overflow-y:auto; flex:1; padding-bottom:20px;";
    el.appendChild(body);
    app.appendChild(el);

    function paint(){
      body.innerHTML = `
        <div class="stat-card" style="margin-bottom:12px;">
          <input type="text" id="cdTitle" placeholder="Alvo (ex: Prova SEFAZ-BA)" class="mk-e-name" style="width:100%; margin-bottom:8px;">
          <div class="market-form-row">
            <input type="date" id="cdDate" style="flex:1;">
            <input type="number" id="cdTopics" inputmode="numeric" min="1" placeholder="tópicos (opc)" style="width:110px;">
            <button class="btn-primary" id="cdAdd" style="flex:0 0 auto; padding:10px 16px;">+</button>
          </div>
        </div>`;
      const sorted = [...doc.targets].sort((a,b)=>daysUntil(a.date)-daysUntil(b.date));
      sorted.forEach(t=>{
        const d = daysUntil(t.date);
        const p = cdPace(t);
        const [y,m,dd] = t.date.split("-");
        const cls = d < 0 ? "late" : (d <= 7 ? "late" : d <= 30 ? "ontime" : "early");
        body.innerHTML += `
          <div class="stat-card" style="margin-bottom:10px;">
            <div class="dev-row" style="border:none; padding:0;">
              <span style="font-family:'Fraunces',serif; font-size:17px;">${escapeHtml(t.title)}</span>
              <button class="del-exec" data-cddel="${t.id}">&#10005;</button>
            </div>
            <div class="cd-big ${cls}">${d>=0 ? d : "+"+Math.abs(d)}<span> dia(s)${d<0?" atrás":""}</span></div>
            <div class="dev-n">${dd}/${m}/${y}</div>
            ${t.topics != null ? `
            <div class="cd-topics">
              <button class="ctrl-btn" style="width:36px;height:36px;font-size:15px;" data-cdminus="${t.id}">&minus;</button>
              <span><input type="number" class="cd-done-inp" data-cddone="${t.id}" value="${t.done||0}" inputmode="numeric" min="0" max="${t.topics}"> / <input type="number" class="cd-done-inp" data-cdtotal="${t.id}" value="${t.topics}" inputmode="numeric" min="1"> tópicos</span>
              <button class="ctrl-btn" style="width:36px;height:36px;font-size:15px;" data-cdplus="${t.id}">+</button>
            </div>
            <div class="dev-n" style="margin-top:4px;">ritmo necessário: <b style="color:var(--accent);">${p.txt}</b></div>` : ""}
          </div>`;
      });
      if(doc.targets.length === 0) body.innerHTML += `<div class="empty-state" style="min-height:25vh;"><p>Adicione um alvo com data — os dias restantes e o ritmo se atualizam sozinhos.</p></div>`;

      document.getElementById("cdAdd").onclick = () => {
        const title = document.getElementById("cdTitle").value.trim();
        const date = document.getElementById("cdDate").value;
        if(!title || !date){ showAlertBanner("Preencha o nome e a data"); return; }
        const topics = +document.getElementById("cdTopics").value || null;
        doc.targets.push({ id: uid(), title, date, topics, done:0 });
        saveTemplates(doc); paint();
      };
      body.querySelectorAll("[data-cddel]").forEach(b=> b.onclick = () => {
        confirmModal("Remover este alvo?", "Remover", ()=>{ doc.targets = doc.targets.filter(t=>t.id!==b.dataset.cddel); saveTemplates(doc); paint(); });
      });
      body.querySelectorAll("[data-cdplus]").forEach(b=> b.onclick = () => { const t = doc.targets.find(x=>x.id===b.dataset.cdplus); t.done = Math.min(t.topics, (t.done||0)+1); saveTemplates(doc); paint(); });
      body.querySelectorAll("[data-cdminus]").forEach(b=> b.onclick = () => { const t = doc.targets.find(x=>x.id===b.dataset.cdminus); t.done = Math.max(0, (t.done||0)-1); saveTemplates(doc); paint(); });
      body.querySelectorAll("[data-cddone]").forEach(inp=> inp.onchange = () => { const t = doc.targets.find(x=>x.id===inp.dataset.cddone); t.done = Math.max(0, Math.min(t.topics, +inp.value||0)); saveTemplates(doc); paint(); });
      body.querySelectorAll("[data-cdtotal]").forEach(inp=> inp.onchange = () => { const t = doc.targets.find(x=>x.id===inp.dataset.cdtotal); t.topics = Math.max(1, +inp.value||1); t.done = Math.min(t.done||0, t.topics); saveTemplates(doc); paint(); });
    }
    paint();
    document.getElementById("cdMd").onclick = () => copyMarkdown(countdownMd(doc));
    document.getElementById("cdPdf").onclick = () => {
      let inner = "<h1>" + escapeHtml(doc.title) + "</h1><ul>";
      [...doc.targets].sort((a,b)=>daysUntil(a.date)-daysUntil(b.date)).forEach(t=>{
        const d = daysUntil(t.date);
        const p = cdPace(t);
        const [y,m,dd] = t.date.split("-");
        inner += "<li><b>" + escapeHtml(t.title) + "</b> — " + dd + "/" + m + "/" + y + " — " + (d>=0?"faltam "+d+" dia(s)":Math.abs(d)+" dia(s) atrás");
        if(p && t.topics != null) inner += " — " + (t.done||0) + "/" + t.topics + " tópicos (" + p.txt + ")";
        inner += "</li>";
      });
      exportPdfView(doc.title, inner + "</ul><p class='meta'>gerado em " + localKey() + "</p>");
    };
  }

  /* ============ DESPESAS RÁPIDAS ============ */
  const EXP_CATS = ["Alimentação","Transporte","Moradia","Lazer","Saúde","Educação","Outros"];
  function expensesMd(doc){
    let md = "# " + doc.title + "\n";
    const byMonth = {};
    doc.entries.forEach(e=>{ (byMonth[e.date.slice(0,7)] = byMonth[e.date.slice(0,7)]||[]).push(e); });
    Object.keys(byMonth).sort().reverse().forEach(mk=>{
      const list = byMonth[mk];
      const tot = list.reduce((a,e)=>a+e.value,0);
      md += "\n## " + mk.slice(5,7) + "/" + mk.slice(0,4) + " — total " + brl(tot) + "\n";
      list.sort((a,b)=>b.date.localeCompare(a.date)).forEach(e=>{
        md += "- " + e.date.slice(8,10) + "/" + e.date.slice(5,7) + " — " + e.desc + " — " + brl(e.value) + " (" + e.cat + ")\n";
      });
      const byCat = {};
      list.forEach(e=>{ byCat[e.cat] = (byCat[e.cat]||0) + e.value; });
      md += "  - por categoria: " + Object.entries(byCat).map(([c,v])=>c+" "+brl(v)).join(" · ") + "\n";
    });
    return md;
  }
  function renderExpensesDoc(doc){
    const el = document.createElement("div");
    el.className = "screen";
    tmplHeader(el, doc, `
      <button class="icon-btn" id="exMd" title="Copiar markdown">MD</button>
      <button class="icon-btn" id="exCsv" title="Exportar CSV">CSV</button>`);
    const body = document.createElement("div");
    body.style.cssText = "overflow-y:auto; flex:1; padding-bottom:20px;";
    el.appendChild(body);
    app.appendChild(el);
    let exEditingId = null;

    function paint(){
      body.innerHTML = `
        <div class="stat-card" style="margin-bottom:12px;">
          <input type="text" id="exDesc" placeholder="Descrição" class="mk-e-name" style="width:100%; margin-bottom:8px;">
          <div class="market-form-row">
            <input type="number" id="exVal" inputmode="decimal" min="0" step="0.01" placeholder="R$" style="width:90px;">
            <select id="exCat" style="flex:1;">${EXP_CATS.map(c=>`<option>${c}</option>`).join("")}</select>
            <input type="date" id="exDate" value="${localKey()}" style="width:130px;">
            <button class="btn-primary" id="exAdd" style="flex:0 0 auto; padding:10px 16px;">+</button>
          </div>
        </div>`;
      const byMonth = {};
      doc.entries.forEach(e=>{ (byMonth[e.date.slice(0,7)] = byMonth[e.date.slice(0,7)]||[]).push(e); });
      Object.keys(byMonth).sort().reverse().forEach(mk=>{
        const list = byMonth[mk].sort((a,b)=>b.date.localeCompare(a.date));
        const tot = list.reduce((a,e)=>a+e.value,0);
        const byCat = {};
        list.forEach(e=>{ byCat[e.cat] = (byCat[e.cat]||0) + e.value; });
        let rows = list.map(e=> exEditingId===e.id ? `
          <div class="dev-row" style="flex-wrap:wrap; gap:6px;">
            <input type="text" value="${escapeHtml(e.desc)}" data-exef="desc" class="mk-e-name" style="width:100%;">
            <input type="number" inputmode="decimal" min="0" step="0.01" value="${e.value}" data-exef="value" style="width:90px;">
            <select data-exef="cat" style="flex:1;">${EXP_CATS.map(c=>`<option ${e.cat===c?'selected':''}>${c}</option>`).join("")}</select>
            <input type="date" value="${e.date}" data-exef="date" style="width:130px;">
            <button class="btn-primary" data-exsave="${e.id}" style="padding:8px 14px;">&#10003;</button>
            <button class="del-exec" data-excancel="1">&#10005;</button>
          </div>` : `
          <div class="dev-row">
            <span class="dev-n" style="width:44px;">${e.date.slice(8,10)}/${e.date.slice(5,7)}</span>
            <span style="flex:1; cursor:pointer;" data-exedit="${e.id}" title="Tocar para editar">${escapeHtml(e.desc)}<br><span class="dev-n">${escapeHtml(e.cat)}</span></span>
            <b class="ontime">${brl(e.value)}</b>
            <button class="del-exec" data-exdel="${e.id}">&#10005;</button>
          </div>`).join("");
        let catsHtml = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([c,v])=>{
          const pct = Math.round(v/tot*100);
          return `<div class="bar-row"><div class="bar-name">${escapeHtml(c)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(3,pct)}%"></div></div><div class="bar-val">${brl(v)}</div></div>`;
        }).join("");
        body.innerHTML += `<div class="section-label">${mk.slice(5,7)}/${mk.slice(0,4)} — total ${brl(tot)}</div>
          <div class="stat-card">${catsHtml}</div>
          <div class="stat-card" style="margin-top:6px;">${rows}</div>`;
      });
      if(doc.entries.length === 0) body.innerHTML += `<div class="empty-state" style="min-height:25vh;"><p>Registre um gasto: valor, categoria e data.</p></div>`;

      document.getElementById("exAdd").onclick = () => {
        const desc = document.getElementById("exDesc").value.trim();
        const value = +document.getElementById("exVal").value;
        const date = document.getElementById("exDate").value || localKey();
        if(!desc || !value){ showAlertBanner("Preencha descrição e valor"); return; }
        doc.entries.push({ id: uid(), desc, value, cat: document.getElementById("exCat").value, date });
        saveTemplates(doc); paint();
      };
      body.querySelectorAll("[data-exdel]").forEach(b=> b.onclick = () => { doc.entries = doc.entries.filter(e=>e.id!==b.dataset.exdel); saveTemplates(doc); paint(); });
      body.querySelectorAll("[data-exedit]").forEach(s=> s.onclick = () => { exEditingId = s.dataset.exedit; paint(); });
      body.querySelectorAll("[data-excancel]").forEach(b=> b.onclick = () => { exEditingId = null; paint(); });
      body.querySelectorAll("[data-exsave]").forEach(b=> b.onclick = () => {
        const e = doc.entries.find(x=>x.id===b.dataset.exsave);
        const row = b.closest(".dev-row");
        if(e && row){
          const desc = row.querySelector("[data-exef='desc']").value.trim();
          const value = +row.querySelector("[data-exef='value']").value;
          if(!desc || !value){ showAlertBanner("Preencha descrição e valor"); return; }
          e.desc = desc; e.value = value;
          e.cat = row.querySelector("[data-exef='cat']").value;
          e.date = row.querySelector("[data-exef='date']").value || e.date;
          saveTemplates(doc);
        }
        exEditingId = null; paint();
      });
    }
    paint();
    document.getElementById("exMd").onclick = () => copyMarkdown(expensesMd(doc));
    document.getElementById("exCsv").onclick = () => {
      const rows = [["data","descricao","valor","categoria"]];
      [...doc.entries].sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
        rows.push([e.date, e.desc.replace(/;/g,","), e.value.toFixed(2).replace(".",","), e.cat]);
      });
      const csv = "\ufeff" + rows.map(r=>r.join(";")).join("\n");
      downloadFile(slugify(doc.title) + ".csv", csv, "text/csv;charset=utf-8");
      showAlertBanner("CSV exportado ✓");
    };
  }

  /* ============ PRÓS E CONTRAS ============ */
  function prosconsMd(doc){
    const ps = doc.pros.reduce((a,i)=>a+i.w,0), cs = doc.cons.reduce((a,i)=>a+i.w,0);
    let md = "# " + doc.title + "\n\n## Prós (" + ps + ")\n";
    doc.pros.forEach(i=>{ md += "- " + i.text + " (peso " + i.w + ")\n"; });
    md += "\n## Contras (" + cs + ")\n";
    doc.cons.forEach(i=>{ md += "- " + i.text + " (peso " + i.w + ")\n"; });
    md += "\n**Placar: " + (ps-cs>0?"+":"") + (ps-cs) + "** — " + (ps>cs?"prós vencem":cs>ps?"contras vencem":"empate") + "\n";
    return md;
  }
  function renderProsConsDoc(doc){
    const el = document.createElement("div");
    el.className = "screen";
    tmplHeader(el, doc, `
      <button class="icon-btn" id="pcMd" title="Copiar markdown">MD</button>
      <button class="icon-btn" id="pcPdf" title="Exportar PDF">PDF</button>`);
    const body = document.createElement("div");
    body.style.cssText = "overflow-y:auto; flex:1; padding-bottom:20px;";
    el.appendChild(body);
    app.appendChild(el);
    let pcEditing = null;

    function paint(){
      const ps = doc.pros.reduce((a,i)=>a+i.w,0), cs = doc.cons.reduce((a,i)=>a+i.w,0);
      const verdict = ps>cs ? `<b class="early" style="color:var(--good);">prós vencem (+${ps-cs})</b>` : cs>ps ? `<b class="late">contras vencem (&minus;${cs-ps})</b>` : `<b class="ontime">empate</b>`;
      body.innerHTML = `<div class="stat-card" style="margin-bottom:12px; text-align:center;"><div class="cd-big ontime" style="font-size:34px;">${ps} &times; ${cs}</div><div>${verdict}</div></div>`;
      [["pros","Prós","#6B8F71"],["cons","Contras","#B25B4C"]].forEach(([key,label,color])=>{
        let rows = doc[key].map((i,ii)=> pcEditing===key+"-"+ii ? `
          <div class="dev-row">
